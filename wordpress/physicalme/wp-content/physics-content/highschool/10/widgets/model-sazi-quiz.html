<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خودت را بسنج</title>
<style>
  :root{
    --bg:#ffffff; --surface:#f4f3ef; --text:#1a1a18; --muted:#5f5e5a;
    --border:#e0ded7;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#1f1e1c; --surface:#2a2926; --text:#f0efe9; --muted:#a8a69e; --border:#3a3835; }
  }
  *{box-sizing:border-box;}
  body{margin:0; padding:16px; font-family:Vazirmatn,Tahoma,system-ui,sans-serif;
    background:var(--bg); color:var(--text);}
  .qa-item{border:1px solid var(--border); border-radius:12px; margin-bottom:10px;
    overflow:hidden; background:var(--bg);}
  .qa-q{width:100%; text-align:right; border:none; background:transparent; padding:14px 16px;
    font-size:15px; font-weight:600; color:var(--text); cursor:pointer; display:flex;
    justify-content:space-between; align-items:center; gap:10px; line-height:1.6;
    font-family:inherit;}
  .qa-q .arrow{flex-shrink:0; transition:transform .2s; font-size:13px;}
  .qa-a{max-height:0; overflow:hidden; transition:max-height .25s ease;}
  .qa-a p{margin:0; padding:0 16px 16px; font-size:15px; line-height:1.8; color:var(--muted);
    border-top:1px solid var(--border); padding-top:12px;}
</style>
</head>
<body>
  <div id="qa"></div>
<script>
  var items=[
    {q:"۱. مدل‌سازی رو با یه جمله‌ی خودت تعریف کن.",
     a:"مدل‌سازی یعنی یه پدیده‌ی فیزیکی رو اون‌قدر ساده و آرمانی کنیم که بشه راحت بررسی و تحلیلش کرد — با نادیده گرفتنِ چیزای جزئی، تا اون چیزِ اصلی واضح بشه."},
    {q:"۲. چرا توپِ بسکتبالو «ذره» فرض می‌کنیم، با اینکه می‌دونیم توپ که نقطه نیست؟",
     a:"چون برای تحلیلِ حرکتش، شکل و اندازه‌ی توپ تأثیرِ مهمی نداره. وقتی توپو یه نقطه (ذره) فرض می‌کنیم، از پیچیدگیِ بی‌فایده خلاص می‌شیم و فقط رو چیزی که مهمه (مسیر و نیروها) تمرکز می‌کنیم."},
    {q:"۳. تفاوتِ «اثرِ جزئی» و «اثرِ تعیین‌کننده» رو با یه مثال از پرتابِ توپ توضیح بده.",
     a:"تو پرتابِ توپ، مقاومتِ هوا یه اثرِ جزئیه که می‌شه نادیده‌ش گرفت. ولی نیروی گرانش یه اثرِ تعیین‌کننده‌ست — اگه اونو نادیده بگیری، مدلت می‌گه توپ تا ابد صاف می‌ره بالا و هیچ‌وقت برنمی‌گرده! پس فقط اثرهای جزئی رو حذف می‌کنیم، نه مهم‌ها رو."},
    {q:"۴. اگه موقعِ مدل‌سازیِ سقوطِ یه برگِ درخت، مقاومتِ هوا رو نادیده بگیری، چه اتفاقِ بدی می‌افته؟",
     a:"برگ دقیقاً به‌خاطرِ مقاومتِ هوا و سطحِ پهنش آروم و تاب‌خوران می‌افته. اگه مقاومتِ هوا رو حذف کنی، مدلت می‌گه برگ مثلِ یه سنگ تند سقوط می‌کنه — که کاملاً غلطه! اینجا مقاومتِ هوا یه اثرِ تعیین‌کننده‌ست، نه جزئی."},
    {q:"۵. یه پدیده‌ی دیگه از زندگیِ روزمره مثال بزن و بگو برای مدل‌سازیش چیا رو نادیده می‌گیری.",
     a:"نمونه: حرکتِ یه اتومبیل رو جاده. می‌تونیم ماشینو یه ذره فرض کنیم، شکلِ بدنه و چرخ‌ها و حتی اصطکاکِ هوا رو (در سرعتِ کم) نادیده بگیریم. ولی نیروی موتور و اصطکاکِ لاستیک با جاده رو نمی‌شه حذف کرد چون تعیین‌کننده‌ان. جوابِ ثابتی نداره؛ مهم اینه که دلیلتو بگی."}
  ];
  var box=document.getElementById("qa");
  items.forEach(function(it){
    var wrap=document.createElement("div");wrap.className="qa-item";
    var btn=document.createElement("button");btn.className="qa-q";
    btn.innerHTML="<span>"+it.q+"</span><span class='arrow'>▼</span>";
    var ans=document.createElement("div");ans.className="qa-a";
    var p=document.createElement("p");p.textContent=it.a;ans.appendChild(p);
    var open=false;
    btn.addEventListener("click",function(){open=!open;
      ans.style.maxHeight=open?ans.scrollHeight+"px":"0";
      btn.querySelector(".arrow").style.transform=open?"rotate(180deg)":"rotate(0deg)";});
    wrap.appendChild(btn);wrap.appendChild(ans);box.appendChild(wrap);
  });
</script>
</body>
</html>
