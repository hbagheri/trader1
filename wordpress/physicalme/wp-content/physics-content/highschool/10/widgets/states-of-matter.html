<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حالت‌های ماده — شبیه‌سازِ مولکولی</title>
<style>
  :root{
    --bg:#ffffff; --surface:#f4f3ef; --text:#1a1a18; --muted:#5f5e5a;
    --border:#e0ded7; --info:#185fa5; --info-bg:#e6f1fb;
    --ok:#1d9e75; --warn:#a87800; --solid:#3b5c8a; --liquid:#1d9e75;
    --gas:#a87800; --plasma:#c0392b;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#1f1e1c; --surface:#2a2926; --text:#f0efe9; --muted:#a8a69e;
           --border:#3a3835; --info:#85b7eb; --info-bg:#0c447c; --ok:#5dcaa5; }
  }
  *{box-sizing:border-box}
  body{margin:0;padding:16px;font-family:Vazirmatn,Tahoma,system-ui,sans-serif;
       background:var(--bg);color:var(--text);line-height:1.7}
  h2{margin:0 0 12px;font-size:1.05em;color:var(--info)}
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .btn{padding:8px 14px;border:1.5px solid var(--border);border-radius:10px;
       background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;
       font-size:0.95em;font-weight:600;transition:all .15s}
  .btn:hover{transform:translateY(-1px)}
  .btn.active{color:#fff}
  .btn.active[data-s="solid"]{background:var(--solid);border-color:var(--solid)}
  .btn.active[data-s="liquid"]{background:var(--liquid);border-color:var(--liquid)}
  .btn.active[data-s="gas"]{background:var(--gas);border-color:var(--gas)}
  .btn.active[data-s="plasma"]{background:var(--plasma);border-color:var(--plasma)}
  canvas{background:var(--surface);border-radius:14px;width:100%;max-width:560px;
         display:block;margin:0 auto;border:1px solid var(--border)}
  .info{margin-top:12px;padding:12px;background:var(--info-bg);border-radius:10px;
        color:var(--info);font-size:0.95em}
  .info b{color:var(--text)}
  .slider-row{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
  .slider-row label{min-width:80px;font-weight:600}
  input[type=range]{flex:1;min-width:140px}
  .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.85em;
         background:var(--surface);border:1px solid var(--border)}
</style>
</head>
<body>
<h2>🧊💧🌬️⚡ حالت‌های ماده — تماشای مولکول‌ها</h2>

<div class="controls">
  <button class="btn active" data-s="solid">🧊 جامد</button>
  <button class="btn" data-s="liquid">💧 مایع</button>
  <button class="btn" data-s="gas">🌬️ گاز</button>
  <button class="btn" data-s="plasma">⚡ پلازما</button>
</div>

<canvas id="cv" width="560" height="380"></canvas>

<div class="slider-row">
  <label>دما</label>
  <input type="range" id="temp" min="0" max="100" value="20">
  <span class="badge" id="tempBadge">۲۰°C</span>
</div>

<div class="info" id="info">
  <b>جامد:</b> مولکول‌ها در یک شبکهٔ منظم چیده شدن و فقط جای خودشون لرزش می‌کنن.
  نیروی جاذبه‌ی بین مولکولی غالبه. حجم و شکلِ ثابت.
</div>

<script>
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;
let state = 'solid';
let temp = 20;

const info = {
  solid:  '<b>جامد:</b> مولکول‌ها در یک شبکهٔ منظم چیده شدن و فقط جای خودشون لرزش می‌کنن. نیروی جاذبه‌ی بین مولکولی غالبه. حجم و شکلِ ثابت.',
  liquid: '<b>مایع:</b> مولکول‌ها هنوز نزدیک به هم‌ـن ولی می‌تونن آزادانه روی هم بلغزن. حجمِ ثابت، شکل می‌گیره از ظرف.',
  gas:    '<b>گاز:</b> فاصله‌ی بزرگ بین مولکول‌ها، حرکتِ تصادفیِ سریع. حجم و شکل هیچ‌کدوم ثابت نیست — کلِ ظرفو پر می‌کنه.',
  plasma: '<b>پلازما:</b> گازِ یونیزه — انرژیِ خیلی زیاد، الکترون‌ها از اتم جدا شده‌ن (نقطه‌های ریز). نمونه: خورشید 🌞، صاعقه ⚡، چراغ‌های نئون.'
};

class Particle {
  constructor(x, y, r=8) {
    this.x = x; this.y = y; this.r = r;
    this.vx = 0; this.vy = 0;
    this.hx = x; this.hy = y;  // home for solid
    this.charge = 0;
  }
}

let particles = [];
function init(){
  particles = [];
  if (state === 'solid'){
    const cols = 12, rows = 8, dx = W/(cols+1), dy = (H-40)/(rows+1);
    for(let i=0;i<cols;i++) for(let j=0;j<rows;j++){
      particles.push(new Particle(dx*(i+1), 30 + dy*(j+1), 9));
    }
  } else if (state === 'liquid'){
    for(let i=0;i<70;i++){
      const x = 30 + Math.random()*(W-60);
      const y = H/2 + Math.random()*(H/2 - 30);
      const p = new Particle(x, y, 8);
      p.vx = (Math.random()-.5)*1.2; p.vy = (Math.random()-.5)*1.2;
      particles.push(p);
    }
  } else if (state === 'gas'){
    for(let i=0;i<35;i++){
      const x = 30 + Math.random()*(W-60);
      const y = 30 + Math.random()*(H-60);
      const p = new Particle(x, y, 7);
      p.vx = (Math.random()-.5)*5; p.vy = (Math.random()-.5)*5;
      particles.push(p);
    }
  } else if (state === 'plasma'){
    for(let i=0;i<50;i++){
      const x = 30 + Math.random()*(W-60);
      const y = 30 + Math.random()*(H-60);
      const p = new Particle(x, y, i%3===0 ? 3 : 8);
      p.charge = i%3===0 ? -1 : 1;
      p.vx = (Math.random()-.5)*8; p.vy = (Math.random()-.5)*8;
      particles.push(p);
    }
  }
}

function step(){
  ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--surface');
  ctx.fillRect(0,0,W,H);
  const tempBoost = 0.4 + temp/40;

  for (const p of particles){
    if (state === 'solid'){
      const k = 0.04;
      p.vx += -k*(p.x - p.hx) + (Math.random()-.5)*tempBoost*0.6;
      p.vy += -k*(p.y - p.hy) + (Math.random()-.5)*tempBoost*0.6;
      p.vx *= 0.92; p.vy *= 0.92;
    } else if (state === 'liquid'){
      // gravity + jitter + soft floor
      p.vy += 0.05 * tempBoost;
      p.vx += (Math.random()-.5)*0.4*tempBoost;
      p.vy += (Math.random()-.5)*0.4*tempBoost;
      p.vx *= 0.985; p.vy *= 0.985;
      if (p.y + p.r > H-10){ p.y = H-10-p.r; if(p.vy>0) p.vy *= -0.4; }
    } else if (state === 'gas'){
      p.vx += (Math.random()-.5)*0.1;
      p.vy += (Math.random()-.5)*0.1;
    } else if (state === 'plasma'){
      p.vx += (Math.random()-.5)*0.4;
      p.vy += (Math.random()-.5)*0.4;
    }
    p.x += p.vx; p.y += p.vy;
    if (p.x < p.r){ p.x = p.r; p.vx = Math.abs(p.vx); }
    if (p.x > W-p.r){ p.x = W-p.r; p.vx = -Math.abs(p.vx); }
    if (p.y < p.r){ p.y = p.r; p.vy = Math.abs(p.vy); }
    if (p.y > H-p.r){ p.y = H-p.r; p.vy = -Math.abs(p.vy)*0.8; }
  }

  // draw
  for (const p of particles){
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    if (state === 'solid'){ ctx.fillStyle = '#3b5c8a'; }
    else if (state === 'liquid'){ ctx.fillStyle = '#1d9e75'; }
    else if (state === 'gas'){ ctx.fillStyle = '#a87800'; }
    else if (state === 'plasma'){
      ctx.fillStyle = p.charge < 0 ? '#85b7eb' : '#c0392b';
    }
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  requestAnimationFrame(step);
}

document.querySelectorAll('.btn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    state = b.dataset.s;
    document.getElementById('info').innerHTML = info[state];
    init();
  };
});

const tempEl = document.getElementById('temp');
const badgeEl = document.getElementById('tempBadge');
const faDigit = n => String(n).replace(/\d/g, d => '۰۱۲۳۴۵۶۷۸۹'[d]);
tempEl.oninput = () => {
  temp = +tempEl.value;
  badgeEl.textContent = faDigit(temp) + '°C';
};

init();
step();
</script>
</body>
</html>
