<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مبدل یکا</title>
<style>
  :root{--bg:#fff;--surface:#f4f3ef;--text:#1a1a18;--muted:#5f5e5a;--hint:#9b9a93;--border-strong:#cbc9c0;--info:#185fa5;}
  @media (prefers-color-scheme:dark){:root{--bg:#1f1e1c;--surface:#2a2926;--text:#f0efe9;--muted:#a8a69e;--hint:#76746d;--border-strong:#4a4844;--info:#85b7eb;}}
  *{box-sizing:border-box;}
  body{margin:0;padding:16px;font-family:Vazirmatn,Tahoma,system-ui,sans-serif;background:var(--bg);color:var(--text);}
  button.cat{font-size:13px;font-family:inherit;background:transparent;color:var(--text);border:1px solid var(--border-strong);border-radius:8px;padding:7px 14px;cursor:pointer;transition:.15s;}
  button.cat:hover{background:var(--surface);}
  input,select{font-family:inherit;font-size:14px;padding:8px;border-radius:8px;border:1px solid var(--border-strong);background:var(--bg);color:var(--text);}
  .cats{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .grid{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:end;}
  label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;}
  #outval{font-size:22px;font-weight:600;color:var(--info);padding:6px 0;font-family:monospace;min-height:34px;}
  .arrow{font-size:22px;color:var(--hint);padding-bottom:8px;}
  .cap{font-size:13px;color:var(--hint);margin:14px 0 0;line-height:1.7;}
</style>
</head>
<body>
  <div class="cats">
    <button class="cat" data-c="len">طول</button>
    <button class="cat" data-c="speed">سرعت</button>
    <button class="cat" data-c="mass">جرم</button>
    <button class="cat" data-c="time">زمان</button>
  </div>
  <div class="grid">
    <div><label>از</label><input type="number" id="inval" value="100" style="width:100%;margin-bottom:6px;"><select id="from" style="width:100%;"></select></div>
    <div class="arrow">←</div>
    <div><label>به</label><div id="outval">۱</div><select id="to" style="width:100%;"></select></div>
  </div>
  <p class="cap">یکای SI پایه برای هر دسته با ستاره (★) مشخص شده. عددو عوض کن یا یکاها رو تغییر بده تا تبدیل زنده انجام بشه.</p>
<script>
  var faNum=function(s){return String(s).replace(/[0-9]/g,function(d){return "۰۱۲۳۴۵۶۷۸۹"[d];});};
  var units={
    len:{list:[["کیلومتر (km)",1000],["متر ★ (m)",1],["سانتی‌متر (cm)",0.01],["میلی‌متر (mm)",0.001]]},
    speed:{list:[["متر بر ثانیه ★ (m/s)",1],["کیلومتر بر ساعت (km/h)",0.27778]]},
    mass:{list:[["تُن (t)",1000],["کیلوگرم ★ (kg)",1],["گرم (g)",0.001],["میلی‌گرم (mg)",0.000001]]},
    time:{list:[["ساعت (h)",3600],["دقیقه (min)",60],["ثانیه ★ (s)",1]]}
  };
  var cat="len",fromEl=document.getElementById("from"),toEl=document.getElementById("to");
  var inval=document.getElementById("inval"),outval=document.getElementById("outval");
  function fill(){
    fromEl.innerHTML="";toEl.innerHTML="";
    units[cat].list.forEach(function(u){
      var o1=document.createElement("option");o1.value=u[1];o1.textContent=u[0];fromEl.appendChild(o1);
      var o2=document.createElement("option");o2.value=u[1];o2.textContent=u[0];toEl.appendChild(o2);
    });
    toEl.selectedIndex=Math.min(1,units[cat].list.length-1);calc();
  }
  function calc(){
    var v=parseFloat(inval.value)||0,f=parseFloat(fromEl.value),t=parseFloat(toEl.value);
    outval.textContent=faNum(Math.round(v*f/t*10000)/10000);
  }
  document.querySelectorAll(".cat").forEach(function(b){
    b.addEventListener("click",function(){
      cat=b.dataset.c;
      document.querySelectorAll(".cat").forEach(function(x){x.style.borderColor="";x.style.color="";});
      b.style.borderColor="var(--info)";b.style.color="var(--info)";fill();
    });
  });
  inval.addEventListener("input",calc);fromEl.addEventListener("change",calc);toEl.addEventListener("change",calc);
  document.querySelector(".cat").style.borderColor="var(--info)";
  document.querySelector(".cat").style.color="var(--info)";
  fill();
</script>
</body>
</html>
