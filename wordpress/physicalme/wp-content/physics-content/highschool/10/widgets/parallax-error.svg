<svg viewBox="0 0 500 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="خطای اختلاف منظر: سه نگاه از سه زاویه، سه عدد متفاوت" font-family="Vazirmatn,Tahoma,sans-serif">
  <style>
    .scale{stroke:#cbc9c0;stroke-width:2;}
    .tick{stroke:#888780;stroke-width:1.5;}
    .needle{stroke:#d85a30;stroke-width:3;}
    .correct{stroke:#1d9e75;stroke-width:1.5;stroke-dasharray:4 3;}
    .wrong{stroke:#e24b4a;stroke-width:1.5;stroke-dasharray:4 3;}
    .lbl{fill:#5f5e5a;font-size:13px;}
    .lblok{fill:#1d9e75;font-size:13px;}
    .lblno{fill:#e24b4a;font-size:13px;}
    @media (prefers-color-scheme:dark){
      .scale{stroke:#4a4844;} .tick{stroke:#a8a69e;} .lbl{fill:#a8a69e;}
      .needle{stroke:#f0997b;} .correct{stroke:#5dcaa5;} .lblok{fill:#5dcaa5;}
    }
  </style>

  <line class="scale" x1="120" y1="60" x2="120" y2="220"/>
  <line class="tick" x1="105" y1="80" x2="120" y2="80"/>
  <line class="tick" x1="105" y1="120" x2="120" y2="120"/>
  <line class="tick" x1="105" y1="160" x2="120" y2="160"/>
  <line class="tick" x1="105" y1="200" x2="120" y2="200"/>
  <line class="needle" x1="120" y1="140" x2="180" y2="140"/>
  <circle cx="180" cy="140" r="5" fill="#d85a30"/>

  <line class="correct" x1="180" y1="140" x2="360" y2="140"/>
  <text class="lblok" x="370" y="144">✓ نگاهِ درست (روبه‌رو)</text>

  <line class="wrong" x1="180" y1="140" x2="360" y2="80"/>
  <text class="lblno" x="370" y="80">✗ نگاه از بالا</text>

  <line class="wrong" x1="180" y1="140" x2="360" y2="200"/>
  <text class="lblno" x="370" y="204">✗ نگاه از پایین</text>

  <text class="lbl" x="120" y="245" text-anchor="middle">خطای اختلافِ منظر</text>
</svg>
