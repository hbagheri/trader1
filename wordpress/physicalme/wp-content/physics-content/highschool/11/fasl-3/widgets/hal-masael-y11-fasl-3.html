<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حل مسائل — فصل ۳ یازدهم: مغناطیس</title>
<style>
  :root{
    --bg:#ffffff; --surface:#f4f3ef; --text:#1a1a18; --muted:#5f5e5a;
    --hint:#9b9a93; --border:#e0ded7; --info:#185fa5; --info-bg:#e6f1fb;
    --hint-c:#a87800; --hint-bg:#fef6e0; --ok:#1d9e75; --ok-bg:#e3f5ed;
    --check:#7a4dbd; --check-bg:#efe6f9; --bad:#c43838; --bad-bg:#fce5e5;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#1f1e1c; --surface:#2a2926; --text:#f0efe9; --muted:#a8a69e;
      --hint:#76746d; --border:#3a3835; --info:#85b7eb; --info-bg:#0c447c;
      --hint-c:#e0b860; --hint-bg:#4a3a15; --ok:#5dcaa5; --ok-bg:#1a4a35;
      --check:#b08be8; --check-bg:#3a2858; --bad:#f0807d; --bad-bg:#4a1f1f; }
  }
  *{box-sizing:border-box;}
  body{margin:0; padding:16px; font-family:Vazirmatn,Tahoma,system-ui,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.8;}
  .problem{border:1px solid var(--border); border-radius:14px; padding:18px 20px;
    margin-bottom:18px; background:var(--bg);}
  .pnum{display:inline-block; background:var(--info-bg); color:var(--info);
    font-weight:700; padding:2px 10px; border-radius:8px; font-size:13px; margin-bottom:8px;}
  .pq{font-size:15.5px; margin:6px 0 14px; color:var(--text); line-height:1.85;}
  .ptype{font-size:12px; color:var(--muted); margin-bottom:10px;}
  .relate{font-size:13px; color:var(--muted); background:var(--surface);
    padding:8px 12px; border-radius:8px; margin-bottom:12px; border-right:3px solid var(--info);}
  .controls{margin:10px 0 4px; display:flex; flex-wrap:wrap; gap:8px;}
  .btn{font-family:inherit; font-size:14px; padding:8px 16px; border-radius:10px;
    border:1px solid var(--border); background:var(--bg); color:var(--text);
    cursor:pointer; transition:.15s;}
  .btn:hover{background:var(--surface);}
  .btn-hint{color:var(--hint-c); border-color:var(--hint-c);}
  .btn-next{color:var(--info); border-color:var(--info);}
  .btn-check{color:var(--check); border-color:var(--check);}
  .btn:disabled{opacity:.4; cursor:not-allowed;}
  .step{margin-top:12px; padding:12px 14px; border-radius:10px; background:var(--info-bg);
    border-right:3px solid var(--info); animation:fadeIn .25s ease;}
  .step b{color:var(--info);}
  .hint-box{margin-top:12px; padding:12px 14px; border-radius:10px;
    background:var(--hint-bg); border-right:3px solid var(--hint-c);
    animation:fadeIn .25s ease;}
  .hint-box b{color:var(--hint-c);}
  .final{margin-top:12px; padding:14px; border-radius:10px; background:var(--ok-bg);
    border-right:3px solid var(--ok); animation:fadeIn .25s ease;}
  .final b{color:var(--ok);}
  .check-box{margin-top:12px; padding:14px; border-radius:10px; background:var(--check-bg);
    border-right:3px solid var(--check); animation:fadeIn .25s ease;}
  .check-box b{color:var(--check);}
  .check-row{display:flex; align-items:center; gap:8px; margin:6px 0; flex-wrap:wrap;}
  .check-row label{min-width:24px; font-weight:600; color:var(--text);}
  .check-row input{flex:1; min-width:120px; padding:7px 10px; border-radius:8px;
    border:1px solid var(--border); background:var(--bg); color:var(--text);
    font-family:inherit; font-size:14px;}
  .check-row .unit{font-size:13px; color:var(--muted); white-space:nowrap;}
  .check-result{margin-top:10px; padding:10px 12px; border-radius:8px; font-size:14px;}
  .check-result.ok{background:var(--ok-bg); color:var(--ok); border-right:3px solid var(--ok);}
  .check-result.bad{background:var(--bad-bg); color:var(--bad); border-right:3px solid var(--bad);}
  .check-result b{font-weight:700;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:none;}}
  .label{font-size:11px; font-weight:700; letter-spacing:.5px; margin-bottom:4px;
    display:inline-block;}
  h1.page-title{font-size:22px; margin:8px 0 18px; color:var(--text);}
  .intro{background:var(--surface); padding:14px 16px; border-radius:12px; margin-bottom:18px;
    font-size:14px; color:var(--muted); line-height:1.8;}
  .intro b{color:var(--text);}

  /* ---- master-detail layout ---- */
  .layout{display:grid; grid-template-columns:200px 1fr; gap:22px; align-items:start;}
  @media (max-width:620px){ .layout{grid-template-columns:1fr;} }
  .sidebar{background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:14px; position:sticky; top:16px; max-height:calc(100vh - 32px);
    overflow-y:auto;}
  .sidebar h2{font-size:13px; font-weight:700; color:var(--muted); letter-spacing:1px;
    margin:0 0 10px; text-transform:uppercase; padding:0 4px;}
  .sidebar ol{list-style:none; padding:0; margin:0; counter-reset:msc;}
  .sidebar li{margin:2px 0;}
  .sidebar .nav-btn{display:flex; align-items:center; gap:10px; width:100%;
    text-align:right; font-family:inherit; font-size:14px; color:var(--text);
    padding:9px 12px; background:transparent; border:none; border-radius:8px;
    cursor:pointer; line-height:1.5; transition:.12s;}
  .sidebar .nav-btn:hover{background:var(--bg);}
  .sidebar .nav-btn.active{background:var(--info-bg); color:var(--info); font-weight:700;}
  .sidebar .nav-btn .nb-num{flex-shrink:0; min-width:26px; height:26px;
    border-radius:50%; background:var(--bg); color:var(--muted); display:flex;
    align-items:center; justify-content:center; font-size:12px; font-weight:700;
    border:1px solid var(--border);}
  .sidebar .nav-btn.active .nb-num{background:var(--info); color:#fff; border-color:var(--info);}
  .sidebar .nav-btn .nb-title{flex:1; min-width:0; overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap;}
  @media (max-width:620px){
    .sidebar{position:relative; top:0; max-height:none;}
    .sidebar ol{display:grid; grid-template-columns:repeat(auto-fill, minmax(56px,1fr)); gap:6px;}
    .sidebar .nav-btn{justify-content:center; padding:8px 6px; font-size:13px;}
    .sidebar .nav-btn .nb-title{display:none;}
  }
  .nav-arrows{display:flex; gap:10px; margin-top:18px; justify-content:space-between;}
  .nav-arrows .btn{flex:1;}
  .nav-arrows .btn:disabled{visibility:hidden;}
</style>

<body>
  <h1 class="page-title">حل مسائل فصل ۳ یازدهم — مغناطیس 🧲</h1>
  <div class="intro">
    اینجا هر مسئله رو می‌تونی <b>قدم‌به‌قدم</b> پیش بری. اگه گیر کردی <b>💡 راهنمایی</b> بگیر؛ اگه خودت حل کردی و فقط می‌خوای جوابتو چک کنی، رو <b>🔍 بررسی جواب من</b> کلیک کن. تلرانسِ بررسی حدودِ ۵٪ ـه تا اعدادِ رُند هم قبول بشن.
  </div>
  <div class="layout">
    <aside class="sidebar">
      <h2>فهرست مسائل</h2>
      <ol id="nav-list"></ol>
    </aside>
    <main>
      <div id="problems"></div>
      <div class="nav-arrows">
        <button class="btn" id="prev-btn">← مسئله‌ی قبلی</button>
        <button class="btn btn-next" id="next-btn">مسئله‌ی بعدی →</button>
      </div>
    </main>
  </div>

<script>
// ============================================================
// مسائل فصل ۱
// ساختار هر مسئله:
//   n         شماره (نمایشی)
//   type      نوع
//   q         صورت سؤال (HTML)
//   relate    ارتباط با مسائل قبلی (اختیاری)
//   hint      راهنمایی (اختیاری)
//   steps     آرایه‌ی قدم‌های حل (HTML)
//   final     جواب نهایی (HTML)
//   check     [{label, value, unit, tol?}]  ← اگر بود، دکمه‌ی بررسی جواب فعال می‌شود
// ============================================================
var problems = [

  // ===== ۳-۱ و ۳-۲: مغناطیس، قطب‌ها، میدان مغناطیسی =====
  {n:"۱", type:"مفهومی — قطب‌نما و خطوط میدان",
   q:"با توجه به جهت‌گیری عقربه‌های مغناطیسی در شکل زیر، قطب‌های آهنربای میله‌ای و جهت خط‌های میدان مغناطیسی را تعیین کنید.<br><img src=\"../images/03-p01-magnet-poles.png\" alt=\"عقربه‌های قطب‌نما\" style=\"max-width:340px;width:100%;display:block;margin:10px auto;\">",
   relate:"🔗 جهت‌گیری قطب‌نما را در «۳-۱ مغناطیس و قطب‌ها» دیدیم.",
   hint:"یادت باشه: نوکِ <b>قرمزِ</b> سوزن قطب‌نما (قطب N سوزن) همیشه به سمتِ خط میدان اشاره می‌کنه — یعنی به طرفِ قطبِ S آهنربا.",
   steps:[
     "<b>قانون پایه:</b> خطوط میدان مغناطیسی بیرونِ آهنربا از قطبِ N خارج می‌شن و به قطبِ S برمی‌گردن.",
     "<b>کاربرد روی شکل:</b> هر سوزنِ قطب‌نما، نوک قرمزش (N) رو در جهت خط میدان نشون می‌ده. اگه نوک‌ها به یه سرِ آهنربا اشاره می‌کنن، اون سر S ـه (چون خطوط به طرف S می‌رن). اگه از یه سر دور می‌شن، اون سر N ـه.",
     "<b>جهت خطوط:</b> از طرف N آهنربا به سمت S، با مسیر منحنیِ بسته‌ای که از بیرون اطراف می‌چرخه."
   ],
   final:"<b>درسِ کلیدی:</b> سوزنِ قطب‌نما در هر نقطه، جهتِ <b>بردار B</b> رو در اون نقطه نشون می‌ده — نوک N سوزن همیشه در جهتِ میدان می‌چرخه. این تعریفِ عملیِ جهت میدان مغناطیسی است."
  },

  {n:"۲", type:"مفهومی — میدان بینِ دو آهنربای همنام",
   q:"شکل زیر خط‌های میدان مغناطیسی نزدیک دو آهنربای میله‌ای یکسان رو نشون می‌ده.<br><img src=\"../images/03-p02-two-magnets.png\" alt=\"میدان دو آهنربا\" style=\"max-width:380px;width:100%;display:block;margin:10px auto;\"><br><b>الف)</b> دربارهٔ میدان در نقطهٔ A چی می‌تونی بگی؟<br><b>ب)</b> با رسم شکل نشون بده عقربهٔ قطب‌نما در نقاط B و C در چه جهتی قرار می‌گیره؟<br><b>پ)</b> اگه یکی از آهنرباها چرخونده بشه و قطب‌هاش جابه‌جا بشن، خطوط در ناحیهٔ نقطه‌چین چجوری رسم می‌شن؟",
   hint:"وقتی دو قطبِ همنام مقابلِ هم باشن (N به N یا S به S)، خطوط میدان از همدیگه دفع می‌شن. در نقطهٔ <b>وسطی</b> ممکنه میدان صفر بشه — همه‌ی خطوط دفع می‌شن، هیچ‌کدوم از اون نقطه عبور نمی‌کنه.",
   steps:[
     "<b>الف — نقطهٔ A (وسطِ بین دو قطبِ همنام):</b> دو میدان از هر دو آهنربا هم‌اندازه و در جهت‌های <b>مخالف</b> می‌رسن → برهم‌نهی → <b>میدان صفر</b>. این یه «نقطه‌ی خنثی» (Neutral Point) ـه.",
     "<b>ب — قطب‌نما در B و C:</b> در هر نقطه، عقربه در جهتِ <b>میدان برایند</b> در اون نقطه قرار می‌گیره. در B (نزدیک‌تر به یه آهنربا) عقربه عمدتاً از میدانِ همون آهنربا تأثیر می‌گیره؛ در C هم همینطور.",
     "<b>پ — وقتی یه آهنربا چرخونده بشه:</b> حالا قطب‌های مقابل ناهمنام می‌شن (N به S). خطوط بینشون به‌جای دفع، <b>به هم متصل</b> می‌شن — مثل آهنربای میله‌ایِ بزرگ‌تر."
   ],
   final:"<b>درسِ کلیدی:</b> در نقطه‌ای که میدان‌های دو آهنربا هم‌اندازه و مخالف باشن، <b>نقطهٔ خنثی</b> ایجاد می‌شه. این جاها قطب‌نما نمی‌چرخه چون هیچ نیرویی روش نیست."
  },

  {n:"۳", type:"مفهومی — تشخیص قطب و مقایسهٔ شدّت",
   q:"<b>الف)</b> آهنربای میله‌ای با قطب‌های نامشخص داریم. دستِ کم دو روش برای تعیین قطب‌ها بیان کنید.<br><b>ب)</b> در شکل زیر، اندازهٔ میدان نزدیکِ قطب‌های دو آهنربا را با هم مقایسه کنید.<br><img src=\"../images/03-p03-compare-magnets.png\" alt=\"مقایسهٔ شدّت میدان\" style=\"max-width:340px;width:100%;display:block;margin:10px auto;\">",
   hint:"چگالی خطوط میدان = شدّت میدان. هرجا خطوط متراکم‌ترن، میدان قوی‌تره.",
   steps:[
     "<b>الف — روش‌های تشخیص قطب:</b><br>۱) <b>قطب‌نمای کمکی</b>: یه قطب‌نمای با قطب معلوم رو نزدیک کن؛ سرِ N سوزن به سمت قطبِ S آهنربای ناشناخته می‌چرخه.<br>۲) <b>آویزانش کن:</b> آهنربا رو از وسط با نخ آویزون کن. سرش به طرفِ شمالِ جغرافیایی (که قطب S آهنربایی زمینه) می‌چرخه؛ پس اون سر، N آهنرباست.<br>۳) <b>برادهٔ آهن</b>: روی کاغذ بپاش، آهنربا زیرش بذار. الگوی خطوط رو ببین؛ سپس با قطب‌نمای کمکی جهت رو پیدا کن.",
     "<b>ب — مقایسهٔ شدّت:</b> در شکل، نزدیکِ یکی از آهنرباها خطوط متراکم‌ترن. اون آهنربا، نزدیکِ قطب‌هاش <b>میدان قوی‌تری</b> داره. تراکم خطوط، مستقیماً متناسب با اندازهٔ B ـه."
   ],
   final:"<b>درسِ کلیدی:</b> دو قاعده‌ی مهم: قطبِ N سوزنِ آویز به سمتِ شمال جغرافیایی می‌چرخه (اولین استفاده‌ی تاریخی قطب‌نما) + <b>تراکم خطوط میدان</b> در نقشه‌ی میدان، اندازه‌ی B رو نشون می‌ده."
  },

  {n:"۴", type:"مفهومی — کاربردِ پزشکی",
   q:"کودکی یه قطعهٔ کوچکِ آهنی رو بلعیده. پزشک می‌خواد با دستگاهی مثل شکل زیر (آهنربای دائمیِ متحرک در غلافِ انعطاف‌پذیر و نوکِ آهنیِ ثابت) از گلوش بیرون بیاره.<br><img src=\"../images/03-p04-throat-doctor.png\" alt=\"دستگاه استخراج پزشکی\" style=\"max-width:340px;width:100%;display:block;margin:10px auto;\"><br><b>الف)</b> چه اتفاقی توی نوکِ آهنی می‌افته وقتی آهنربا نزدیکش می‌شه؟<br><b>ب)</b> نوکِ آهنیِ ثابت چه مزیتی داره؟<br><b>پ)</b> چرا غلاف باید انعطاف‌پذیر باشه؟<br><b>ت)</b> گیرهٔ آهنی و واشرِ آلومینیومی — کدوم رو می‌شه بیرون آورد؟",
   hint:"دو مفهوم کلیدی: <b>القای مغناطیسی</b> (آهنِ نرم در حضور آهنربا، خودش هم آهنربا می‌شه) + تفاوت رفتار <b>آهن</b> (فرومغناطیس) با <b>آلومینیوم</b> (پارامغناطیسِ خیلی ضعیف).",
   steps:[
     "<b>الف — القا در نوک آهنی:</b> وقتی آهنربای دائمی به نوکِ آهنیِ ثابت نزدیک می‌شه، نوک <b>القاءاً مغناطیسی</b> می‌شه — اتم‌های آهن نوک هم‌جهت با میدان آهنربا می‌شن. نوک تبدیل به یه آهنربای کوچکِ موقتی می‌شه که می‌تونه قطعهٔ آهنیِ بلعیده‌شده رو جذب کنه.",
     "<b>ب — مزیتِ نوک آهنی:</b> نوک تماس مستقیم با بافت داره و باعث می‌شه میدان مغناطیسی <b>متمرکز</b> و <b>قوی</b> در محل کار باشه. آهنربای دائمی توی غلاف ـه (بدون تماس)، نوک کارِ آهن‌ربا رو در نزدیکیِ هدف انجام می‌ده.",
     "<b>پ — چرا غلاف انعطاف‌پذیر؟</b> چون باید از گلو و مری‌ی <b>پیچ‌خورده</b>ی کودک عبور کنه؛ سفت بودنش آسیب می‌زنه.",
     "<b>ت — گیره‌ی آهنی یا واشر آلومینیومی؟</b><br>گیره‌ی آهنی <b>فرومغناطیسه</b> و به‌شدت جذب می‌شه → <b>بیرون می‌آد</b>.<br>واشر آلومینیومی <b>پارامغناطیسِ ضعیفه</b> → عملاً <b>جذب نمی‌شه</b> و نمی‌شه با این روش بیرون آوردش."
   ],
   final:"<b>درسِ کلیدی:</b> این دستگاه از دو پدیده استفاده می‌کنه: <b>القای مغناطیسی</b> در نوکِ آهنی، و تفاوت اساسیِ بین فرومغناطیس (آهن) و پارامغناطیس (آلومینیوم). همین تفاوته که توی MRI هم اهمیت داره — فلزات مغناطیسی خطرناک‌اند."
  },

  // ===== ۳-۳: نیرو بر بار متحرک =====
  {n:"۵", type:"مفهومی — نوع بار از مسیر",
   q:"چهار ذرّه در حین عبور از میدان مغناطیسی هم‌جهت، مسیرهایی مطابق شکل می‌پیمایند. دربارهٔ نوع بار هر ذرّه چی می‌تونی بگی؟<br><img src=\"../images/03-p05-trajectories.png\" alt=\"مسیر چهار ذرّه\" style=\"max-width:340px;width:100%;display:block;margin:10px auto;\">",

var faNum = function(n){
  return String(n).replace(/[0-9]/g, function(d){ return "۰۱۲۳۴۵۶۷۸۹"[d]; });
};

function formatExpected(v){
  // برای اعدادِ علمیِ بزرگ، نمایشِ خواناتر
  if(Math.abs(v) >= 1e4 || (Math.abs(v) < 1e-2 && v !== 0)){
    return v.toExponential(2);
  }
  return String(v);
}

function checkAnswer(user, expected, tol){
  // tol پیش‌فرض ۵٪
  tol = tol || 0.05;
  if(isNaN(user)) return {ok:false, msg:"عددِ معتبر وارد کن."};
  if(expected === 0){
    return {ok: Math.abs(user) < 1e-9, msg:""};
  }
  var diff = Math.abs(user - expected) / Math.abs(expected);
  return {ok: diff <= tol, diff: diff};
}

  var nextBtn = document.createElement("button");
  nextBtn.className = "btn btn-next";
  nextBtn.textContent = "▶️ شروع حل / قدم بعدی";
  ctrl.appendChild(nextBtn);

  var checkBtn = null;
  if(p.check && p.check.length){
    checkBtn = document.createElement("button");
    checkBtn.className = "btn btn-check";
    checkBtn.textContent = "🔍 بررسی جواب من";
    ctrl.appendChild(checkBtn);
  }

  div.appendChild(ctrl);

  // hint handler
  if(hintBtn){
    var hintShown = false;
    hintBtn.addEventListener("click", function(){
      if(hintShown) return;
      hintShown = true;
      var h = document.createElement("div");
      h.className = "hint-box";
      h.innerHTML = "<b>راهنمایی:</b> " + p.hint;
      div.appendChild(h);
      hintBtn.disabled = true;
    });
  }

  // step-by-step
  var idx = 0;
  nextBtn.addEventListener("click", function(){
    if(idx < p.steps.length){
      var s = document.createElement("div");
      s.className = "step";
      s.innerHTML = "<span class='label' style='color:var(--info);'>قدم " + faNum(String(idx+1)) + "</span><br>" + p.steps[idx];
      div.appendChild(s);
      idx++;
      if(idx === p.steps.length){
        nextBtn.textContent = "✅ نمایش جواب نهایی";
      }
    } else if(idx === p.steps.length){
      var f = document.createElement("div");
      f.className = "final";
      f.innerHTML = "<b>✅ جواب نهایی:</b><br>" + p.final;
      div.appendChild(f);
      nextBtn.disabled = true;
      nextBtn.textContent = "تمام";
      idx++;
    }
  });

  // check-answer
  if(checkBtn){
    var checkShown = false;
    checkBtn.addEventListener("click", function(){
      if(checkShown) return;
      checkShown = true;
      checkBtn.disabled = true;

      var cb = document.createElement("div");
      cb.className = "check-box";
      cb.innerHTML = "<b>🔍 جوابِ خودتو وارد کن:</b><br><span style='font-size:13px; color:var(--muted);'>تلرانس ۵٪؛ از اعدادِ علمی مثل <code>3e4</code> هم می‌تونی استفاده کنی.</span>";

      var inputs = [];
      p.check.forEach(function(c){
        var row = document.createElement("div");
        row.className = "check-row";
        var lbl = document.createElement("label"); lbl.textContent = c.label + ":"; row.appendChild(lbl);
        var inp = document.createElement("input"); inp.type = "text"; inp.placeholder = "عدد..."; row.appendChild(inp);
        var u = document.createElement("span"); u.className = "unit"; u.textContent = c.unit || ""; row.appendChild(u);
        cb.appendChild(row);
        inputs.push({c:c, inp:inp});
      });

      var goBtn = document.createElement("button");
      goBtn.className = "btn btn-check";
      goBtn.textContent = "بررسی";
      goBtn.style.marginTop = "8px";
      cb.appendChild(goBtn);

      var resultArea = document.createElement("div");
      cb.appendChild(resultArea);

      goBtn.addEventListener("click", function(){
        resultArea.innerHTML = "";
        var allOk = true;
        inputs.forEach(function(it){
          var userVal = parseFloat(it.inp.value);
          var r = checkAnswer(userVal, it.c.value, it.c.tol);
          var row = document.createElement("div");
          row.className = "check-result " + (r.ok ? "ok" : "bad");
          if(r.ok){
            row.innerHTML = "✅ <b>" + it.c.label + ":</b> درسته! جوابِ تو نزدیک به " + formatExpected(it.c.value) + " " + (it.c.unit||"") + " ـه.";
          } else {
            allOk = false;
            if(isNaN(userVal)){
              row.innerHTML = "❌ <b>" + it.c.label + ":</b> عددِ معتبر وارد نکردی.";
            } else {
              row.innerHTML = "❌ <b>" + it.c.label + ":</b> جوابت با مقدارِ موردِ انتظار (" + formatExpected(it.c.value) + " " + (it.c.unit||"") + ") اختلافِ زیادی داره. حلِ قدم‌به‌قدم رو ببین.";
            }
          }
          resultArea.appendChild(row);
        });
        if(allOk){
          var hooray = document.createElement("div");
          hooray.className = "check-result ok";
          hooray.style.marginTop = "8px";
          hooray.innerHTML = "🎉 آفرین! همه‌ی جواب‌هات درست بود.";
          resultArea.appendChild(hooray);
        }
      });

      div.appendChild(cb);
    });
  }

  box.appendChild(div);
});

// ─── master-detail navigation ────────────────────────────────
var currentIdx = 0;

function showProblem(idx, updateHash) {
  if (idx < 0 || idx >= problemDivs.length) return;
  problemDivs.forEach(function (d, i) { d.style.display = (i === idx) ? "" : "none"; });
  navBtns.forEach(function (b, i) { b.classList.toggle("active", i === idx); });
  prevBtn.disabled = (idx === 0);
  nextBtn.disabled = (idx === problemDivs.length - 1);
  // scroll the active sidebar item into view (mobile + when list is long)
  navBtns[idx].scrollIntoView({block: "nearest"});
  currentIdx = idx;
  if (updateHash) {
    try { history.replaceState(null, "", "#mas-" + (idx + 1)); } catch (e) {}
  }
  // notify parent iframe (autosize)
  try { window.parent.postMessage({pmEvent: "problem-changed", idx: idx}, "*"); } catch (e) {}
}

prevBtn.addEventListener("click", function () { showProblem(currentIdx - 1, true); });
nextBtn.addEventListener("click", function () { showProblem(currentIdx + 1, true); });

// keyboard left/right
document.addEventListener("keydown", function (e) {
  if (e.target && /INPUT|TEXTAREA/.test(e.target.tagName)) return;
  if (e.key === "ArrowLeft")  showProblem(currentIdx + 1, true);   // RTL: left = next
  if (e.key === "ArrowRight") showProblem(currentIdx - 1, true);
});

// initial: read hash or default to first
(function init() {
  var m = /^#mas-(\d+)$/.exec(location.hash);
  var start = m ? Math.max(0, Math.min(problems.length - 1, parseInt(m[1], 10) - 1)) : 0;
  showProblem(start, false);
})();
</script>
