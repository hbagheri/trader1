<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کاوش‌گر شار مغناطیسی — زاویه و میدان</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --surface:#f4f3ef; --text:#1a1a18; --muted:#5f5e5a;
    --border:#e0ded7; --info:#185fa5; --info-bg:#e6f1fb;
    --ok:#1d9e75; --ok-bg:#e3f5ed;
    --loop:#a87800; --field:#185fa5; --normal:#c43838;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1f1e1c; --surface:#2a2926; --text:#f0efe9; --muted:#a8a69e;
      --border:#3a3835; --info:#85b7eb; --info-bg:#0c447c;
      --ok:#5dcaa5; --ok-bg:#1a4a35;
      --loop:#e0b860; --field:#85b7eb; --normal:#f06a60;
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:16px; background:var(--bg); color:var(--text);
    font-family:Vazirmatn, Tahoma, system-ui, sans-serif; line-height:1.7;
  }
  .wrap{max-width:780px; margin:0 auto;}
  h2{margin:0 0 4px; font-size:17px;}
  .sub{font-size:13px; color:var(--muted); margin:0 0 14px;}
  .layout{display:grid; grid-template-columns:1fr 240px; gap:14px;}
  @media(max-width:680px){.layout{grid-template-columns:1fr;}}
  .stage{background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden;}
  canvas{display:block; width:100%; height:340px;}
  .panel{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px;}
  .panel h3{font-size:13px; margin:8px 0 8px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;}
  .panel h3:first-child{margin-top:0;}
  .slider-row{display:grid; grid-template-columns:1fr 46px; gap:6px; align-items:center; font-size:13px; margin-bottom:10px;}
  .slider-row .val{font-weight:700; text-align:left;}
  .readout{display:flex; gap:8px; padding:10px 12px; flex-wrap:wrap; border-top:1px solid var(--border); background:var(--bg);}
  .chip{flex:1 1 100px; background:var(--info-bg); color:var(--info); border-radius:8px; padding:8px 10px; text-align:center; font-size:13px;}
  .chip b{display:block; font-size:15px; margin-top:1px;}
</style>
  <script id="mathjax-config">
  window.MathJax = {
    tex: { inlineMath: [['$','$'], ['\\(','\\)']],
           displayMath: [['$$','$$'], ['\\[','\\]']],
           processEscapes: true },
    options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] },
    startup: {
      pageReady: function () {
        return MathJax.startup.defaultPageReady().then(function () {
          var obs = new MutationObserver(function () {
            MathJax.typesetPromise().catch(function (e) { console.warn('MathJax err', e); });
          });
          obs.observe(document.body, { childList: true, subtree: true, characterData: true });
        });
      }
    }
  };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body>
<div class="wrap">
  <h2>کاوش‌گر شار مغناطیسی — $\Phi = B \cdot A \cdot \cos\theta$ 📐</h2>
  <p class="sub">زاویه و میدان را تغییر بده و ببین چقدر از خطوط میدان از حلقه عبور می‌کنند.</p>

  <div class="layout">
    <div class="stage">
      <canvas id="cv"></canvas>
      <div class="readout">
        <div class="chip">θ<b id="rTheta">۰°</b></div>
        <div class="chip">B<b id="rB">۰.۲ T</b></div>
        <div class="chip">A<b id="rA">۲۰ cm²</b></div>
        <div class="chip">Φ<b id="rPhi">۰</b></div>
      </div>
    </div>

    <div class="panel">
      <h3>زاویه θ</h3>
      <div class="slider-row">
        <input type="range" id="theta" min="0" max="90" step="1" value="30">
        <span class="val" id="vTheta">۳۰°</span>
      </div>
      <h3>میدان B (تسلا)</h3>
      <div class="slider-row">
        <input type="range" id="bField" min="0" max="1" step="0.05" value="0.2">
        <span class="val" id="vB">۰.۲</span>
      </div>
      <h3>سطح A (cm²)</h3>
      <div class="slider-row">
        <input type="range" id="area" min="5" max="100" step="5" value="20">
        <span class="val" id="vA">۲۰</span>
      </div>
      <p style="font-size:12px; color:var(--muted); margin:10px 0 0;">
      📌 θ=۰: حلقه عمود بر میدان → شار بیشینه<br>
      📌 θ=۹۰°: حلقه موازی → شار صفر
      </p>
    </div>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
function resize(){
  const dpr = window.devicePixelRatio || 1;
  cv.width = cv.clientWidth * dpr; cv.height = cv.clientHeight * dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resize); resize();

let theta = 30, B = 0.2, area = 20;

function getCss(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim() || '#000';}
function toFa(s){return (''+s).replace(/[0-9]/g,d=>'۰۱۲۳۴۵۶۷۸۹'[+d]);}

function draw(){
  const W = cv.clientWidth, H = cv.clientHeight;
  ctx.clearRect(0,0,W,H);

  // background field lines (horizontal, left to right) — many of them
  const lineColor = getCss('--field');
  ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.4;
  const numLines = 11;
  for(let i=0;i<numLines;i++){
    const y = 30 + i * ((H-60)/(numLines-1));
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    // arrowhead
    ctx.beginPath();
    ctx.moveTo(W-15, y); ctx.lineTo(W-22, y-4); ctx.moveTo(W-15, y); ctx.lineTo(W-22, y+4);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // label B
  ctx.fillStyle = lineColor; ctx.font='bold 16px Vazirmatn'; ctx.textAlign='left';
  ctx.fillText('B', 12, 22);

  // Loop ellipse (representing tilted loop)
  // theta = 0 means loop perpendicular to field — appears as a vertical ellipse (we see edge-on width small + height large)
  // theta = 90 means loop parallel to field — we see the loop as a line (only height visible)
  // Use ellipse with width = cos(theta), height = full
  const cx = W/2, cy = H/2;
  const fullR = 90;
  const w = fullR * Math.cos(theta * Math.PI/180);
  const h = fullR;

  // fill loop face
  ctx.beginPath();
  ctx.ellipse(cx, cy, Math.max(w, 4), h, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(168,120,0,.12)';
  ctx.fill();
  ctx.strokeStyle = getCss('--loop'); ctx.lineWidth = 4;
  ctx.stroke();

  // normal line (perpendicular to loop face)
  const nx = Math.sin(theta * Math.PI/180); // horizontal component of normal
  const ny = 0; // approx — for clarity we keep horizontal
  // For visualization, normal sticks out from the loop face. When theta=0, normal points along field (horizontal). When theta=90, normal points perpendicular (still horizontal — different convention).
  // Use convention: theta is angle between normal and B (horizontal). Normal direction: (cos θ, sin θ) — pointing up-right when θ>0.
  const normLen = 70;
  const ndx = Math.cos(theta * Math.PI/180);
  const ndy = -Math.sin(theta * Math.PI/180);
  ctx.strokeStyle = getCss('--normal'); ctx.lineWidth = 2.5;
  ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + ndx*normLen, cy + ndy*normLen); ctx.stroke();
  ctx.setLineDash([]);
  // arrowhead on normal
  const ex = cx + ndx*normLen, ey = cy + ndy*normLen;
  const ang = Math.atan2(ndy, ndx);
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - 9*Math.cos(ang-0.4), ey - 9*Math.sin(ang-0.4));
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - 9*Math.cos(ang+0.4), ey - 9*Math.sin(ang+0.4));
  ctx.stroke();
  ctx.fillStyle = getCss('--normal'); ctx.font='bold 14px Vazirmatn';
  ctx.fillText('n̂', ex + 6, ey + 4);

  // angle arc between normal and field
  ctx.strokeStyle = getCss('--ok'); ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, 26, 0, -theta*Math.PI/180, true);
  ctx.stroke();
  ctx.fillStyle = getCss('--ok'); ctx.font='bold 13px Vazirmatn';
  ctx.fillText('θ', cx + 30*Math.cos(-theta*Math.PI/360), cy + 30*Math.sin(-theta*Math.PI/360) + 4);

  // Flux value
  const A_m2 = area * 1e-4; // cm² to m²
  const phi = B * A_m2 * Math.cos(theta * Math.PI/180);  // Wb

  // Readouts
  document.getElementById('rTheta').textContent = toFa(theta) + '°';
  document.getElementById('rB').textContent = toFa(B.toFixed(2)) + ' T';
  document.getElementById('rA').textContent = toFa(area) + ' cm²';
  const phi_mWb = phi * 1000;
  document.getElementById('rPhi').textContent = toFa(phi_mWb.toFixed(3)) + ' mWb';
}

['theta','bField','area'].forEach(id=>{
  document.getElementById(id).addEventListener('input', e=>{
    if(id==='theta'){ theta = +e.target.value; document.getElementById('vTheta').textContent = toFa(theta) + '°'; }
    if(id==='bField'){ B = +e.target.value; document.getElementById('vB').textContent = toFa(B.toFixed(2)); }
    if(id==='area'){ area = +e.target.value; document.getElementById('vA').textContent = toFa(area); }
    draw();
  });
});

draw();
window.addEventListener('resize', ()=>{ resize(); draw(); });
</script>
</body>
</html>
