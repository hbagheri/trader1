<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خودالقاوری — مدار با کلید و القاگر</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --surface:#f4f3ef; --text:#1a1a18; --muted:#5f5e5a;
    --border:#e0ded7; --info:#185fa5; --info-bg:#e6f1fb;
    --ok:#1d9e75; --ok-bg:#e3f5ed; --warn:#a87800; --warn-bg:#fef6e0;
    --wire:#a87800; --battery-p:#d6453c; --battery-n:#3c3c3c;
    --bulb-on:#ffd54f; --bulb-off:#a8a8a8; --spark:#ff6a55;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1f1e1c; --surface:#2a2926; --text:#f0efe9; --muted:#a8a69e;
      --border:#3a3835; --info:#85b7eb; --info-bg:#0c447c;
      --ok:#5dcaa5; --ok-bg:#1a4a35; --warn:#e0b860; --warn-bg:#4a3a15;
      --wire:#e0b860; --battery-p:#f06a60; --battery-n:#aaa;
      --bulb-on:#ffe082; --bulb-off:#666; --spark:#ff8b78;
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:16px; background:var(--bg); color:var(--text);
    font-family:Vazirmatn, Tahoma, system-ui, sans-serif; line-height:1.7;
  }
  .wrap{max-width:780px; margin:0 auto;}
  h2{margin:0 0 4px; font-size:17px;}
  .sub{font-size:13px; color:var(--muted); margin:0 0 14px;}
  .stage{background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden;}
  canvas{display:block; width:100%; height:330px;}
  .controls{padding:12px; display:flex; gap:8px; border-top:1px solid var(--border); flex-wrap:wrap;}
  .btn{font-family:inherit; font-size:13px; padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); cursor:pointer;}
  .btn.on{background:var(--info); color:#fff; border-color:var(--info);}
  .readout{display:flex; gap:8px; padding:10px 12px; flex-wrap:wrap; border-top:1px solid var(--border); background:var(--bg);}
  .chip{flex:1 1 110px; background:var(--info-bg); color:var(--info); border-radius:8px; padding:7px 10px; text-align:center; font-size:13px;}
  .chip b{display:block; font-size:15px; margin-top:1px;}
  .verdict{padding:10px 12px; background:var(--warn-bg); color:var(--warn); border-top:1px solid var(--border); font-size:13.5px;}
</style>
</head>
<body>
<div class="wrap">
  <h2>خودالقاوری — مدار با کلید، باتری، القاگر و لامپ نئون 💡</h2>
  <p class="sub">کلید را وصل و قطع کن. در لحظهٔ <b>قطعِ</b> کلید، QMF القاییِ بزرگ، لامپ نئون را برای یک لحظه روشن می‌کند.</p>

  <div class="stage">
    <canvas id="cv"></canvas>
    <div class="controls">
      <button class="btn" id="bClose">🔌 وصل کردن کلید</button>
      <button class="btn" id="bOpen">⚡ قطع کردن کلید</button>
      <button class="btn" id="bReset">↩️ ریست</button>
    </div>
    <div class="readout">
      <div class="chip">جریان مدار<b id="rI">۰ A</b></div>
      <div class="chip">EMF خود-القا<b id="rEMF">۰ V</b></div>
      <div class="chip">انرژیِ القاگر<b id="rU">۰ mJ</b></div>
    </div>
    <div id="verdict" class="verdict">حالا کلید رو وصل کن، صبر کن جریان به مقدارِ ثابت برسه، بعد قطعش کن!</div>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
function resize(){
  const dpr = window.devicePixelRatio||1;
  cv.width = cv.clientWidth*dpr; cv.height = cv.clientHeight*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resize); resize();

const L = 0.05;   // 50 mH
const R = 5;      // 5 ohm
const V = 6;      // 6V battery
let I = 0;        // current
let switchClosed = false;
let lastT = 0;
let neonFlash = 0;  // duration of flash
let neonV = 0;

function getCss(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim() || '#000';}
function toFa(s){return (''+s).replace(/[0-9]/g,d=>'۰۱۲۳۴۵۶۷۸۹'[+d]);}

function step(t){
  const dt = Math.min(50, t-lastT) / 1000; lastT = t;
  // RL circuit dynamics
  const Iss = V / R; // steady-state
  const tau = L / R;
  let prevI = I;
  if(switchClosed){
    // L dI/dt = V - I*R  → dI = (V - IR)/L * dt
    const dI = (V - I*R) / L * dt;
    I += dI;
    if(I > Iss) I = Iss;
  } else {
    // After opening, normally I drops to 0 immediately, but L resists → spike!
    // Model: assume neon clamps to ~80V; I decays through neon with effective high R_neon
    if(I > 0.001){
      const R_neon = 200;
      const dI = -I * R_neon / L * dt;
      I += dI;
      if(I < 0) I = 0;
    }
  }
  const dIdt = (I - prevI) / dt;
  const emfL = -L * dIdt;  // self-induced EMF
  // Neon lights when |emfL| > 50V threshold
  if(Math.abs(emfL) > 30) neonFlash = Math.max(neonFlash, 0.4);
  if(neonFlash > 0) neonFlash -= dt * 1.5;
  neonV = Math.abs(emfL);

  draw();
  updateReadouts(I, emfL);
  requestAnimationFrame(step);
}
requestAnimationFrame(step);

function draw(){
  const W = cv.clientWidth, H = cv.clientHeight;
  ctx.clearRect(0,0,W,H);

  // Circuit layout: rectangle. Battery on left, switch top, inductor right, neon parallel to inductor on bottom-right
  const x1 = 60, x2 = W-80, y1 = 50, y2 = H-50;
  ctx.strokeStyle = getCss('--wire'); ctx.lineWidth = 3;
  // Outer rectangle wires
  ctx.beginPath();
  // top wire
  ctx.moveTo(x1, y1); ctx.lineTo((x1+x2)/2 - 30, y1);
  ctx.moveTo((x1+x2)/2 + 30, y1); ctx.lineTo(x2, y1);
  // right wire (down to inductor)
  ctx.moveTo(x2, y1); ctx.lineTo(x2, (y1+y2)/2 - 35);
  ctx.moveTo(x2, (y1+y2)/2 + 35); ctx.lineTo(x2, y2);
  // bottom wire
  ctx.moveTo(x2, y2); ctx.lineTo(x1, y2);
  // left wire (with battery in middle)
  ctx.moveTo(x1, y2); ctx.lineTo(x1, (y1+y2)/2 + 22);
  ctx.moveTo(x1, (y1+y2)/2 - 22); ctx.lineTo(x1, y1);
  ctx.stroke();

  // Battery (in left wire, middle)
  drawBattery(x1, (y1+y2)/2);
  // Switch (in top wire, middle)
  drawSwitch((x1+x2)/2, y1, switchClosed);
  // Inductor (in right wire, middle)
  drawInductor(x2, (y1+y2)/2);
  // Neon lamp (parallel branch on right) — drawn outside the loop at far right
  drawNeon(x2 + 40, (y1+y2)/2, neonFlash > 0);

  // Current arrows on wires
  if(Math.abs(I) > 0.05){
    drawCurrentArrows(x1,x2,y1,y2, I);
  }

  // Spark visualization on switch when opening with high EMF
  if(!switchClosed && neonFlash > 0){
    drawSpark((x1+x2)/2, y1);
  }
}

function drawBattery(cx, cy){
  ctx.fillStyle = getCss('--surface'); ctx.fillRect(cx-12, cy-22, 24, 44);
  // long plate (+)
  ctx.strokeStyle = getCss('--battery-p'); ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(cx-10, cy-8); ctx.lineTo(cx+10, cy-8); ctx.stroke();
  // short plate (-)
  ctx.strokeStyle = getCss('--battery-n');
  ctx.beginPath(); ctx.moveTo(cx-6, cy+8); ctx.lineTo(cx+6, cy+8); ctx.stroke();
  ctx.fillStyle = getCss('--text'); ctx.font='10px Vazirmatn'; ctx.textAlign='center';
  ctx.fillText('۶V', cx, cy+30);
}

function drawSwitch(cx, cy, closed){
  // contacts
  ctx.fillStyle = getCss('--text');
  ctx.beginPath(); ctx.arc(cx-30, cy, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+30, cy, 4, 0, Math.PI*2); ctx.fill();
  // arm
  ctx.strokeStyle = getCss('--text'); ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx-30, cy);
  if(closed){
    ctx.lineTo(cx+30, cy);
  } else {
    ctx.lineTo(cx+22, cy-22);
  }
  ctx.stroke();
  ctx.fillStyle = getCss('--muted'); ctx.font='11px Vazirmatn'; ctx.textAlign='center';
  ctx.fillText('کلید', cx, cy-30);
}

function drawInductor(cx, cy){
  // coiled symbol
  ctx.strokeStyle = getCss('--wire'); ctx.lineWidth = 3;
  ctx.beginPath();
  for(let i=0;i<4;i++){
    const y = cy - 30 + i*20;
    ctx.moveTo(cx, y);
    ctx.bezierCurveTo(cx+20, y, cx+20, y+20, cx, y+20);
  }
  ctx.stroke();
  ctx.fillStyle = getCss('--text'); ctx.font='12px Vazirmatn'; ctx.textAlign='right';
  ctx.fillText('L=۵۰mH', cx - 26, cy + 4);
}

function drawNeon(cx, cy, lit){
  ctx.fillStyle = lit ? getCss('--bulb-on') : getCss('--bulb-off');
  ctx.strokeStyle = getCss('--text'); ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // glow
  if(lit){
    ctx.fillStyle = 'rgba(255,213,79,.3)';
    ctx.beginPath(); ctx.arc(cx, cy, 28, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = getCss('--muted'); ctx.font='10px Vazirmatn'; ctx.textAlign='center';
  ctx.fillText('لامپ نئون', cx, cy+30);
}

function drawSpark(cx, cy){
  ctx.fillStyle = getCss('--spark');
  for(let i=0;i<8;i++){
    const a = Math.random()*Math.PI*2;
    const r = 4 + Math.random()*10;
    ctx.beginPath(); ctx.arc(cx + Math.cos(a)*r, cy + Math.sin(a)*r, 1.5+Math.random()*2, 0, Math.PI*2); ctx.fill();
  }
}

function drawCurrentArrows(x1,x2,y1,y2,curr){
  // little moving dots/arrows around the loop
  ctx.fillStyle = getCss('--info'); ctx.font='bold 14px Vazirmatn';
  const dir = curr > 0 ? 1 : -1;
  // Top wire arrow
  ctx.fillText(dir > 0 ? '→' : '←', (x1+x2)/2 + 60, y1 + 5);
  // Right wire arrow (down for positive direction)
  ctx.save(); ctx.translate(x2, (y1+y2)/2 + 60); ctx.rotate(Math.PI/2);
  ctx.fillText(dir > 0 ? '→' : '←', 0, 0); ctx.restore();
  // Bottom wire
  ctx.fillText(dir > 0 ? '←' : '→', (x1+x2)/2, y2 - 6);
  // Left wire (up)
  ctx.save(); ctx.translate(x1, (y1+y2)/2 - 60); ctx.rotate(-Math.PI/2);
  ctx.fillText(dir > 0 ? '→' : '←', 0, 0); ctx.restore();
}

function updateReadouts(I, emf){
  document.getElementById('rI').textContent = toFa(I.toFixed(2)) + ' A';
  const e = Math.round(emf);
  document.getElementById('rEMF').textContent = toFa(e) + ' V';
  const U = 0.5 * L * I*I * 1000;
  document.getElementById('rU').textContent = toFa(U.toFixed(1)) + ' mJ';

  const el = document.getElementById('verdict');
  if(switchClosed && I < 1.0){
    el.innerHTML = '⏳ کلید وصله، جریان داره کم‌کم بالا می‌ره — القاگر داره مخالفت می‌کنه!';
  } else if(switchClosed && I >= 1.0){
    el.innerHTML = '✅ جریان به مقدار پایا رسید. حالا کلید رو قطع کن!';
  } else if(!switchClosed && Math.abs(emf) > 30){
    el.innerHTML = '⚡ <b>قطعِ ناگهانیِ جریان</b> → آهنگِ تغییرِ خیلی بزرگ → EMF القاییِ خیلی بزرگ → لامپ نئون <b>روشن شد!</b>';
  } else {
    el.innerHTML = 'برای دیدنِ خودالقاوری، اول کلید رو وصل کن، صبر کن، بعد قطع کن.';
  }
}

document.getElementById('bClose').onclick = ()=>{ switchClosed = true; };
document.getElementById('bOpen').onclick = ()=>{ switchClosed = false; };
document.getElementById('bReset').onclick = ()=>{ switchClosed = false; I = 0; neonFlash = 0; };
</script>
</body>
</html>
