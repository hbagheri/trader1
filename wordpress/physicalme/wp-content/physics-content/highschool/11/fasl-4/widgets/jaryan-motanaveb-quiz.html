<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خودتو بسنج — جریان متناوب</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --surface:#f4f3ef; --text:#1a1a18; --muted:#5f5e5a;
    --border:#e0ded7; --info:#185fa5; --info-bg:#e6f1fb; --ok:#1d9e75; --ok-bg:#e3f5ed;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1f1e1c; --surface:#2a2926; --text:#f0efe9; --muted:#a8a69e;
      --border:#3a3835; --info:#85b7eb; --info-bg:#0c447c; --ok:#5dcaa5; --ok-bg:#1a4a35;
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:16px; background:var(--bg); color:var(--text);
    font-family:Vazirmatn, Tahoma, system-ui, sans-serif; line-height:1.8;
  }
  .wrap{max-width:720px; margin:0 auto;}
  .q-item{
    border:1px solid var(--border); border-radius:12px; margin-bottom:10px;
    overflow:hidden; background:var(--surface);
  }
  .q-head{
    display:flex; align-items:center; gap:10px; cursor:pointer;
    padding:13px 15px; font-weight:500; font-size:15px; user-select:none;
  }
  .q-head:hover{background:var(--info-bg);}
  .q-head .tog{
    margin-inline-start:auto; flex:0 0 auto; color:var(--info);
    transition:transform .2s ease; font-size:18px;
  }
  .q-item.open .q-head .tog{transform:rotate(45deg);}
  .q-num{
    flex:0 0 auto; width:26px; height:26px; border-radius:50%;
    background:var(--info); color:#fff; display:flex; align-items:center;
    justify-content:center; font-size:13px; font-weight:700;
  }
  .q-body{
    max-height:0; overflow:hidden; transition:max-height .25s ease;
    background:var(--ok-bg);
  }
  .q-body .inner{padding:13px 15px; color:var(--text); font-size:14.5px;}
  .q-body .inner::before{
    content:"پاسخ: "; color:var(--ok); font-weight:700;
  }
  .hint{font-size:13px; color:var(--muted); margin:0 0 14px;}
  mjx-container{font-size:110%!important;}
</style>
</head>
<body>
<div class="wrap">
  <p class="hint">روی هر سؤال بزن تا پاسخش باز شود 👇</p>
  <div id="quiz"></div>
</div>

<script>
  var items = [
  {
    "q": "تفاوتِ اصلیِ AC و DC چیه؟",
    "a": "<b>DC</b> (مستقیم): جهتِ جریان همیشه ثابته (مثل باتری). <b>AC</b> (متناوب): جهتِ جریان مدام عوض می‌شه — به صورت سینوسی. در ایران، AC در هر ثانیه ۵۰ بار قطب عوض می‌کنه."
  },
  {
    "q": "چرا توی نبردِ ادیسون-وستینگهاوس، AC پیروز شد؟",
    "a": "چون AC رو می‌شه با <b>ترانسفورماتور</b> راحت بالا/پایین برد. این یعنی می‌شه برای انتقالِ دور، ولتاژ رو خیلی بالا برد (و جریان رو کم — اتلاف کم). DC این قابلیت رو نداره."
  },
  {
    "q": "بسامدِ برقِ خانگی در ایران چیه؟ و در آمریکا؟",
    "a": "<b>ایران: ۵۰ هرتز</b> (مثل اروپا). <b>آمریکا: ۶۰ هرتز</b>. به همین دلیل بعضی وسایل (مثل ساعت‌های مکانیکیِ قدیمی) توی هر دو کشور کار نمی‌کنن — چون به فرکانس وابسته‌ن."
  },
  {
    "q": "اگه $T = 20$ میلی‌ثانیه، بسامد چیه؟",
    "a": "$f = 1/T = 1/0.02 = 50\\text{ Hz}$. این همون بسامدِ برقِ خانگی در ایرانه. هر چرخه ۲۰ میلی‌ثانیه طول می‌کشه."
  },
  {
    "q": "چه‌جوری از یه پیچه و آهنربا جریانِ سینوسی تولید می‌کنیم؟",
    "a": "پیچه رو با تندیِ یکنواخت توی میدانِ مغناطیسیِ ثابت <b>می‌چرخونیم</b>. زاویه $\\theta$ به صورت $\\theta = \\omega t$ تغییر می‌کنه. شار $\\Phi = BA\\cos(\\omega t)$ ـه و EMF القایی $\\varepsilon = \\varepsilon_m\\sin(\\omega t)$ — یه موج سینوسی! 🌊"
  },
  {
    "q": "چرا ولتاژِ <i>مؤثرِ</i> ۲۲۰ ولت توی پریز، با ولتاژِ بیشینهٔ ~۳۱۱ ولت فرق می‌کنه؟",
    "a": "چون ولتاژِ مؤثر (RMS) همون ولتاژِ معادلِ DC ـه که <b>همون توانِ گرمایی</b> رو تولید می‌کنه. رابطه: $V_{\\text{rms}} = V_m/\\sqrt{2}$. پس $V_m = 220 \\times \\sqrt{2} \\approx 311$ ولت."
  },
  {
    "q": "چرا AC با اینکه میانگین‌ش صفره، توی یه مقاومت گرما تولید می‌کنه؟",
    "a": "چون توانِ گرمایی $P = I^2 R$ ـه — و $I^2$ همیشه مثبته! جهتِ جریان مهم نیست؛ اندازه‌ش مهمه. به همین خاطر چراغ‌خونه‌ت هرچند با AC کار می‌کنه، گرم و روشن می‌شه."
  },
  {
    "q": "توی نیروگاه‌های واقعی، پیچه می‌چرخه یا آهنربا؟",
    "a": "<b>آهنربا می‌چرخه</b>، پیچه‌ها ثابت‌ن. چرا؟ چون اتصالِ سیمِ متحرک به مدارِ بیرونی سخت و فرسایش‌پذیره. ولی فیزیکِ ماجرا یکیه — حرکتِ نسبی، EMF القا می‌کنه."
  },
  {
    "q": "چرا چراغ‌های فلوئورسانِ قدیمی توی ویدئو سوسو می‌زنن، ولی چشمِ ما نمی‌بینه؟",
    "a": "چون چراغ هر ۲۰ میلی‌ثانیه دو بار خاموش-روشن می‌شه (با AC ۵۰ هرتزی). دوربین فریم‌فریم عکس می‌گیره و این تناوب رو ضبط می‌کنه. ولی <b>چشمِ ما ماندگاریِ بینایی</b> داره — تا ~۱۰ هرتز رو تشخیص می‌ده، نه ۱۰۰ هرتز."
  }
];

  var box = document.getElementById('quiz');
  items.forEach(function(it, i){
    var item = document.createElement('div'); item.className='q-item';
    var head = document.createElement('div'); head.className='q-head';
    head.innerHTML = '<span class="q-num">'+toFa(i+1)+'</span><span>'+it.q+'</span><span class="tog">+</span>';
    var body = document.createElement('div'); body.className='q-body';
    var inner = document.createElement('div'); inner.className='inner'; inner.innerHTML=it.a;
    body.appendChild(inner);
    head.addEventListener('click', function(){
      var open = item.classList.toggle('open');
      body.style.maxHeight = open ? (inner.scrollHeight + 26) + 'px' : '0';
      if(window.MathJax && window.MathJax.typesetPromise){
        window.MathJax.typesetPromise([inner]);
      }
    });
    item.appendChild(head); item.appendChild(body); box.appendChild(item);
  });
  function toFa(n){return (''+n).replace(/[0-9]/g,function(d){return '۰۱۲۳۴۵۶۷۸۹'[+d];});}
</script>
</body>
</html>
