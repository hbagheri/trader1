<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ماشین‌حساب کد رنگی مقاومت</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --surface:#f4f3ef; --text:#1a1a18; --muted:#5f5e5a;
    --border:#e0ded7; --info:#185fa5; --info-bg:#e6f1fb; --ok:#1d9e75; --ok-bg:#e3f5ed;
    --body:#d9c9a3; --lead:#9a9482;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1f1e1c; --surface:#2a2926; --text:#f0efe9; --muted:#a8a69e;
      --border:#3a3835; --info:#85b7eb; --info-bg:#0c447c; --ok:#5dcaa5; --ok-bg:#1a4a35;
      --body:#cdbd97; --lead:#b8b2a4;
    }
  }
  *{box-sizing:border-box;}
  body{margin:0; padding:16px; background:var(--bg); color:var(--text);
       font-family:Vazirmatn, Tahoma, system-ui, sans-serif; line-height:1.8; animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .wrap{max-width:760px; margin:0 auto;}
  h2{font-size:17px; margin:0 0 4px;}
  .sub{font-size:13px; color:var(--muted); margin:0 0 14px;}
  .stage{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px;}
  .btns{display:flex; gap:10px; margin-bottom:14px;}
  .btn{appearance:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;
       background:var(--bg);color:var(--text);border:1.5px solid var(--border);padding:9px 14px;border-radius:10px;flex:1 1 auto;}
  .btn.active{background:var(--info);color:#fff;border-color:var(--info);}
  /* مقاومتِ تصویری */
  .resistor{position:relative; height:84px; margin:6px 0 14px;}
  .lead{position:absolute; top:50%; height:4px; background:var(--lead); transform:translateY(-50%);}
  .lead.l{left:0; width:16%;} .lead.r{right:0; width:16%;}
  .rbody{position:absolute; top:14px; bottom:14px; left:14%; right:14%; background:var(--body);
         border-radius:14px; box-shadow:inset 0 -8px 12px rgba(0,0,0,0.12), inset 0 6px 8px rgba(255,255,255,0.25);}
  .band{position:absolute; top:0; bottom:0; width:9px; transform:translateX(50%); border-radius:1px;}
  /* نتیجه */
  .result{background:var(--info-bg); color:var(--info); border-radius:12px; padding:12px; text-align:center; margin-bottom:14px;}
  .result .big{font-size:24px; font-weight:700; direction:ltr;}
  .result .rng{font-size:12.5px; color:var(--muted); margin-top:3px; direction:ltr;}
  /* انتخابگرها */
  .pick{margin-bottom:10px;}
  .pick .lab{font-size:13px; font-weight:600; margin-bottom:5px;}
  .sw{display:flex; gap:5px; flex-wrap:wrap;}
  .sw button{width:30px; height:26px; border-radius:6px; border:2px solid transparent; cursor:pointer; padding:0; position:relative;}
  .sw button.sel{border-color:var(--info); box-shadow:0 0 0 2px var(--info-bg);}
  .sw button.sel::after{content:'✓'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; text-shadow:0 0 3px rgba(0,0,0,0.7);}
  /* جدول مرجع */
  details{margin-top:14px;}
  summary{cursor:pointer; font-weight:600; font-size:14px; color:var(--info);}
  table{width:100%; border-collapse:collapse; margin-top:10px; font-size:12.5px;}
  th,td{border:1px solid var(--border); padding:5px 6px; text-align:center;}
  th{background:var(--surface);}
  .chipc{display:inline-block; width:14px; height:14px; border-radius:3px; vertical-align:middle; margin-left:5px; border:1px solid rgba(0,0,0,0.2);}
</style>
</head>
<body>
<div class="wrap">
  <h2>🎨 ماشین‌حساب کد رنگی مقاومت</h2>
  <p class="sub">تعداد نوار را انتخاب کن و رنگِ هر نوار را بزن؛ مقدارِ مقاومت و رواداری‌اش زنده حساب می‌شود.</p>

  <div class="stage">
    <div class="btns">
      <button class="btn active" id="b4" type="button">۴ نواره</button>
      <button class="btn" id="b5" type="button">۵ نواره</button>
    </div>

    <div class="resistor">
      <div class="lead l"></div><div class="lead r"></div>
      <div class="rbody" id="rbody"></div>
    </div>

    <div class="result">
      <div class="big" id="val">—</div>
      <div class="rng" id="rng"></div>
    </div>

    <div id="pickers"></div>

    <details>
      <summary>📋 جدولِ مرجعِ رنگ‌ها</summary>
      <table id="ref"></table>
    </details>
  </div>
</div>

<script>
(function(){
  var COLORS=[
    {id:"black", fa:"مشکی", hex:"#1a1a1a", d:0, m:0, t:null},
    {id:"brown", fa:"قهوه‌ای", hex:"#7B3F00", d:1, m:1, t:1},
    {id:"red", fa:"قرمز", hex:"#c0392b", d:2, m:2, t:2},
    {id:"orange", fa:"نارنجی", hex:"#e67e22", d:3, m:3, t:null},
    {id:"yellow", fa:"زرد", hex:"#f1c40f", d:4, m:4, t:null},
    {id:"green", fa:"سبز", hex:"#1d9e75", d:5, m:5, t:0.5},
    {id:"blue", fa:"آبی", hex:"#2f6fd0", d:6, m:6, t:0.25},
    {id:"violet", fa:"بنفش", hex:"#8e44ad", d:7, m:7, t:0.1},
    {id:"grey", fa:"خاکستری", hex:"#7f8c8d", d:8, m:8, t:0.05},
    {id:"white", fa:"سفید", hex:"#f0f0f0", d:9, m:9, t:null},
    {id:"gold", fa:"طلایی", hex:"#c9a227", d:null, m:-1, t:5},
    {id:"silver", fa:"نقره‌ای", hex:"#bdc3c7", d:null, m:-2, t:10}
  ];
  function C(id){ return COLORS.find(function(c){return c.id===id;}); }
  function toFa(s){ return (''+s).replace(/[0-9.]/g,function(d){return d==='.'?'٫':'۰۱۲۳۴۵۶۷۸۹'[+d];}); }

  var bands=4;
  // وضعیتِ پیش‌فرض: قهوه‌ای-مشکی-قرمز-طلایی = ۱kΩ ±۵٪
  var state4={d1:"brown", d2:"black", mult:"red", tol:"gold"};
  var state5={d1:"brown", d2:"black", d3:"black", mult:"brown", tol:"brown"};

  var digitColors=COLORS.filter(function(c){return c.d!==null;});      // مشکی..سفید
  var multColors=COLORS.slice();                                       // همه (شاملِ طلایی/نقره‌ای)
  var tolColors=COLORS.filter(function(c){return c.t!==null;});        // رنگ‌های رواداری

  function slots(){
    return bands===4
      ? [{k:"d1",lab:"رقمِ اول",opts:digitColors},{k:"d2",lab:"رقمِ دوم",opts:digitColors},{k:"mult",lab:"ضریب (×۱۰ⁿ)",opts:multColors},{k:"tol",lab:"رواداری",opts:tolColors}]
      : [{k:"d1",lab:"رقمِ اول",opts:digitColors},{k:"d2",lab:"رقمِ دوم",opts:digitColors},{k:"d3",lab:"رقمِ سوم",opts:digitColors},{k:"mult",lab:"ضریب (×۱۰ⁿ)",opts:multColors},{k:"tol",lab:"رواداری",opts:tolColors}];
  }
  function st(){ return bands===4? state4 : state5; }

  function fmtOhm(v){
    var unit="Ω", val=v;
    if(v>=1e9){val=v/1e9;unit="GΩ";} else if(v>=1e6){val=v/1e6;unit="MΩ";}
    else if(v>=1e3){val=v/1e3;unit="kΩ";}
    var s=(Math.abs(val%1)<1e-9)? String(Math.round(val)) : (+val.toFixed(2)).toString();
    return toFa(s)+" "+unit;
  }

  function compute(){
    var s=st();
    var sig = bands===4
      ? C(s.d1).d*10 + C(s.d2).d
      : C(s.d1).d*100 + C(s.d2).d*10 + C(s.d3).d;
    var v = sig * Math.pow(10, C(s.mult).m);
    var tol = C(s.tol).t;
    return {v:v, tol:tol};
  }

  function renderBands(){
    var rbody=document.getElementById("rbody");
    rbody.innerHTML="";
    var s=st();
    var keys = bands===4? ["d1","d2","mult","tol"] : ["d1","d2","d3","mult","tol"];
    // موقعیتِ نوارها (٪ از بدنه)؛ نوارِ آخر (رواداری) با فاصله
    var pos = bands===4? [16,30,46,80] : [13,23,33,49,82];
    keys.forEach(function(k,i){
      var b=document.createElement("div");
      b.className="band";
      b.style.left=pos[i]+"%";
      b.style.background=C(s[k]).hex;
      if(C(s[k]).id==="white") b.style.boxShadow="0 0 0 1px rgba(0,0,0,0.2) inset";
      rbody.appendChild(b);
    });
  }

  function renderResult(){
    var r=compute();
    document.getElementById("val").textContent=fmtOhm(r.v)+"  ±"+toFa(r.tol)+"٪";
    var lo=r.v*(1-r.tol/100), hi=r.v*(1+r.tol/100);
    document.getElementById("rng").textContent="بازه: "+fmtOhm(lo)+" تا "+fmtOhm(hi);
  }

  function renderPickers(){
    var box=document.getElementById("pickers"); box.innerHTML="";
    var s=st();
    slots().forEach(function(slot){
      var wrap=document.createElement("div"); wrap.className="pick";
      var lab=document.createElement("div"); lab.className="lab"; lab.textContent=slot.lab; wrap.appendChild(lab);
      var sw=document.createElement("div"); sw.className="sw";
      slot.opts.forEach(function(c){
        var btn=document.createElement("button");
        btn.style.background=c.hex; btn.title=c.fa;
        if(c.id==="white") btn.style.border="2px solid var(--border)";
        if(s[slot.k]===c.id) btn.className="sel";
        btn.addEventListener("click",function(){
          st()[slot.k]=c.id; renderBands(); renderResult(); renderPickers();
        });
        sw.appendChild(btn);
      });
      wrap.appendChild(sw); box.appendChild(wrap);
    });
  }

  function renderRef(){
    var t=document.getElementById("ref");
    var rows='<tr><th>رنگ</th><th>رقم</th><th>ضریب</th><th>رواداری</th></tr>';
    COLORS.forEach(function(c){
      var mult = c.m>=0? "×۱۰"+sup(c.m) : (c.m===-1? "×۰٫۱" : "×۰٫۰۱");
      rows+='<tr><td><span class="chipc" style="background:'+c.hex+'"></span>'+c.fa+'</td>'+
            '<td>'+(c.d!==null?toFa(c.d):"—")+'</td>'+
            '<td>'+mult+'</td>'+
            '<td>'+(c.t!==null?"±"+toFa(c.t)+"٪":"—")+'</td></tr>';
    });
    t.innerHTML=rows;
  }
  function sup(n){ return (''+n).replace(/[0-9]/g,function(d){return "⁰¹²³⁴⁵⁶⁷⁸⁹"[+d];}); }

  function setBands(n){
    bands=n;
    document.getElementById("b4").classList.toggle("active",n===4);
    document.getElementById("b5").classList.toggle("active",n===5);
    renderBands(); renderResult(); renderPickers();
  }
  document.getElementById("b4").addEventListener("click",function(){setBands(4);});
  document.getElementById("b5").addEventListener("click",function(){setBands(5);});

  renderRef(); setBands(4);
})();
</script>
</body>
</html>
