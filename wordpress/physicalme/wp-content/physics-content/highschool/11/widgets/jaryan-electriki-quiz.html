<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خودتو بسنج — جریان الکتریکی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --surface:#f4f3ef; --text:#1a1a18; --muted:#5f5e5a;
    --border:#e0ded7; --info:#185fa5; --info-bg:#e6f1fb; --ok:#1d9e75; --ok-bg:#e3f5ed;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1f1e1c; --surface:#2a2926; --text:#f0efe9; --muted:#a8a69e;
      --border:#3a3835; --info:#85b7eb; --info-bg:#0c447c; --ok:#5dcaa5; --ok-bg:#1a4a35;
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:16px; background:var(--bg); color:var(--text);
    font-family:Vazirmatn, Tahoma, system-ui, sans-serif; line-height:1.8;
  }
  .wrap{max-width:720px; margin:0 auto;}
  .q-item{
    border:1px solid var(--border); border-radius:12px; margin-bottom:10px;
    overflow:hidden; background:var(--surface);
  }
  .q-head{
    display:flex; align-items:center; gap:10px; cursor:pointer;
    padding:13px 15px; font-weight:500; font-size:15px; user-select:none;
  }
  .q-head:hover{background:var(--info-bg);}
  .q-head .tog{
    margin-inline-start:auto; flex:0 0 auto; color:var(--info);
    transition:transform .2s ease; font-size:18px;
  }
  .q-item.open .q-head .tog{transform:rotate(45deg);}
  .q-num{
    flex:0 0 auto; width:26px; height:26px; border-radius:50%;
    background:var(--info); color:#fff; display:flex; align-items:center;
    justify-content:center; font-size:13px; font-weight:700;
  }
  .q-body{
    max-height:0; overflow:hidden; transition:max-height .25s ease;
    background:var(--ok-bg);
  }
  .q-body .inner{padding:13px 15px; color:var(--text); font-size:14.5px;}
  .q-body .inner::before{
    content:"پاسخ: "; color:var(--ok); font-weight:700;
  }
  .hint{font-size:13px; color:var(--muted); margin:0 0 14px;}
</style>
</head>
<body>
<div class="wrap">
  <p class="hint">روی هر سؤال بزن تا پاسخش باز شود 👇</p>
  <div id="quiz"></div>
</div>

<script>
  var items = [
    { q: "جریان الکتریکی دقیقاً یعنی چه؟",
      a: "<b>شارشِ خالصِ بار</b> از یک سطحِ مقطعِ معیّن. حرکتِ کاتوره‌ای (بی‌نظمِ) الکترون‌ها جریان نمی‌سازد؛ باید یک شارشِ خالص در یک جهت باشد." },
    { q: "چرا بدونِ باتری در سیم جریان نداریم؟",
      a: "چون الکترون‌های آزاد در همه‌ی جهت‌ها کاتوره‌ای حرکت می‌کنند و شارشِ خالص صفر است. باتری با ایجادِ اختلاف پتانسیل و میدان، آن‌ها را در یک جهت <b>سوق</b> می‌دهد." },
    { q: "جهتِ قراردادیِ جریان نسبت به الکترون‌ها چگونه است؟",
      a: "<b>برخلافِ</b> جهتِ حرکتِ الکترون‌ها (جریان را در جهتِ حرکتِ بارِ مثبت می‌گیرند)." },
    { q: "اگر سرعتِ سوقِ الکترون‌ها این‌قدر کم است، چرا لامپ فوری روشن می‌شود؟",
      a: "چون میدانِ الکتریکی تقریباً با سرعتِ نور در سیم پخش می‌شود و <b>هم‌زمان</b> همه‌ی الکترون‌ها را به حرکت درمی‌آورد (مثلِ شیلنگِ پُر از آب)." },
    { q: "شدتِ جریان چطور تعریف می‌شود و یکایش چیست؟",
      a: "<b>I = Δq/Δt</b> (بارِ عبوری بر زمان). یکایش <b>آمپر (A)</b> = کولن بر ثانیه است." },
    { q: "جریانِ مستقیم (DC) یعنی چه؟",
      a: "جریانی که با زمان <b>تغییر نمی‌کند</b> و مقدارش ثابت می‌ماند." }
  ];

  var box = document.getElementById('quiz');
  items.forEach(function(it, i){
    var item = document.createElement('div'); item.className='q-item';
    var head = document.createElement('div'); head.className='q-head';
    head.innerHTML = '<span class="q-num">'+toFa(i+1)+'</span><span>'+it.q+'</span><span class="tog">+</span>';
    var body = document.createElement('div'); body.className='q-body';
    var inner = document.createElement('div'); inner.className='inner'; inner.innerHTML=it.a;
    body.appendChild(inner);
    head.addEventListener('click', function(){
      var open = item.classList.toggle('open');
      body.style.maxHeight = open ? (inner.scrollHeight + 26) + 'px' : '0';
    });
    item.appendChild(head); item.appendChild(body); box.appendChild(item);
  });
  function toFa(n){return (''+n).replace(/[0-9]/g,function(d){return '۰۱۲۳۴۵۶۷۸۹'[+d];});}
</script>
</body>
</html>
