<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کارت‌های حافظه — فصل ۲ فیزیک یازدهم</title>
<style>
  :root{
    --bg:#ffffff; --surface:#f4f3ef; --text:#1a1a18; --muted:#5f5e5a;
    --border:#e0ded7; --info:#185fa5; --info-bg:#e6f1fb;
    --ok:#1d9e75; --ok-bg:#e3f5ed; --bad:#c43838; --bad-bg:#fce5e5;
    --warn:#a87800; --warn-bg:#fef6e0; --accent:#7a4dbd; --accent-bg:#efe6f9;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#1f1e1c; --surface:#2a2926; --text:#f0efe9; --muted:#a8a69e;
      --border:#3a3835; --info:#85b7eb; --info-bg:#0c447c;
      --ok:#5dcaa5; --ok-bg:#1a4a35; --bad:#f0807d; --bad-bg:#4a1f1f;
      --warn:#e0b860; --warn-bg:#4a3a15; --accent:#b08be8; --accent-bg:#3a2858; }
  }
  *{box-sizing:border-box;}
  body{margin:0; padding:20px; font-family:Vazirmatn,Tahoma,system-ui,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.7; min-height:100vh;}

  .screen{display:none;}
  .screen.active{display:block;}

  /* ─── home screen ─── */
  .home-title{font-size:24px; font-weight:800; text-align:center; margin:10px 0 8px;}
  .home-sub{font-size:14px; color:var(--muted); text-align:center; margin:0 0 26px;}
  .mode-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; max-width:560px; margin:0 auto;}
  @media(max-width:520px){ .mode-grid{grid-template-columns:1fr;} }
  .mode-card{padding:24px 20px; border-radius:16px; border:2px solid var(--border);
    background:var(--surface); cursor:pointer; text-align:center; transition:.2s;
    font-family:inherit; color:var(--text); font-size:15px; line-height:1.7;}
  .mode-card:hover{transform:translateY(-3px); border-color:var(--info); box-shadow:0 8px 20px rgba(0,0,0,.08);}
  .mode-card .mode-icon{font-size:42px; line-height:1; margin-bottom:8px;}
  .mode-card .mode-name{font-size:18px; font-weight:700; color:var(--text); margin-bottom:4px;}
  .mode-card .mode-desc{font-size:13px; color:var(--muted);}

  .stats-row{display:flex; justify-content:center; gap:16px; margin-top:26px; flex-wrap:wrap;}
  .stat{background:var(--surface); padding:10px 16px; border-radius:10px; border:1px solid var(--border);
    font-size:13px; color:var(--muted);}
  .stat b{color:var(--text); font-size:16px;}

  /* ─── back/reset row ─── */
  .top-bar{display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;
    padding-bottom:12px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:8px;}
  .btn-back{background:transparent; border:1px solid var(--border); padding:6px 14px;
    border-radius:8px; font-family:inherit; font-size:13px; color:var(--muted); cursor:pointer;}
  .btn-back:hover{background:var(--surface);}
  .progress-info{font-size:14px; color:var(--muted);}
  .progress-info b{color:var(--text);}

  /* ─── flashcard ─── */
  .card-wrap{max-width:560px; margin:0 auto;}
  .flashcard{position:relative; min-height:240px; perspective:1000px; margin:18px 0;}
  .card-inner{position:relative; width:100%; min-height:240px; transition:transform .55s;
    transform-style:preserve-3d;}
  .flashcard.flipped .card-inner{transform:rotateY(180deg);}
  .card-face{position:absolute; inset:0; backface-visibility:hidden;
    border:2px solid var(--border); border-radius:18px; padding:30px 26px;
    background:var(--bg); display:flex; flex-direction:column; justify-content:center;
    align-items:center; text-align:center;}
  .card-face.back{transform:rotateY(180deg); background:var(--ok-bg); border-color:var(--ok);}
  .card-q{font-size:19px; font-weight:600; line-height:1.8; color:var(--text);}
  .card-a-label{font-size:13px; color:var(--ok); font-weight:700; margin-bottom:10px;}
  .card-a{font-size:17px; line-height:1.9; color:var(--text);}
  .card-tap{font-size:12px; color:var(--muted); margin-top:18px;}

  .rate-row{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:18px;}
  .btn-rate{padding:14px; border-radius:12px; font-family:inherit; font-size:15px; font-weight:700;
    cursor:pointer; border:2px solid; transition:.15s;}
  .btn-rate.no{border-color:var(--bad); background:var(--bad-bg); color:var(--bad);}
  .btn-rate.yes{border-color:var(--ok); background:var(--ok-bg); color:var(--ok);}
  .btn-rate:hover{transform:scale(1.02);}
  .btn-rate:disabled{opacity:.35; cursor:not-allowed; transform:none;}

  .progress-bar{height:8px; background:var(--surface); border-radius:99px; overflow:hidden; margin-bottom:12px;}
  .progress-bar > div{height:100%; background:var(--info); transition:width .3s;}

  /* ─── quiz mode ─── */
  .quiz-header{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:18px;
    font-size:14px;}
  .quiz-stat{background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:8px 10px; text-align:center;}
  .quiz-stat b{font-size:18px; color:var(--text);}
  .quiz-stat .sl{display:block; font-size:11px; color:var(--muted); margin-bottom:2px;}

  .quiz-q{background:var(--bg); border:2px solid var(--border); border-radius:14px;
    padding:24px 22px; margin-bottom:16px; font-size:18px; line-height:1.9; font-weight:600;
    text-align:center; min-height:120px; display:flex; align-items:center; justify-content:center;}
  .choices{display:grid; gap:10px;}
  .choice{padding:14px 18px; border:2px solid var(--border); border-radius:12px;
    background:var(--bg); cursor:pointer; font-family:inherit; font-size:15px; text-align:right;
    color:var(--text); transition:.15s;}
  .choice:hover:not(:disabled){border-color:var(--info); background:var(--info-bg);}
  .choice:disabled{cursor:not-allowed;}
  .choice.correct{background:var(--ok-bg); border-color:var(--ok); color:var(--ok); font-weight:700;}
  .choice.wrong{background:var(--bad-bg); border-color:var(--bad); color:var(--bad); font-weight:700;}

  .timer-bar{height:6px; background:var(--surface); border-radius:99px; overflow:hidden; margin-bottom:14px;}
  .timer-bar > div{height:100%; background:var(--warn); transition:width 1s linear;}

  .feedback{margin-top:14px; padding:14px 18px; border-radius:12px; font-size:14px; line-height:1.7;
    border-right:3px solid;}
  .feedback.ok{background:var(--ok-bg); color:var(--ok); border-color:var(--ok);}
  .feedback.bad{background:var(--bad-bg); color:var(--bad); border-color:var(--bad);}

  .btn-next-q{margin-top:14px; padding:12px 24px; border-radius:10px; border:2px solid var(--info);
    background:var(--info); color:#fff; font-family:inherit; font-size:15px; font-weight:700;
    cursor:pointer; width:100%;}
  .btn-next-q:hover{opacity:.9;}

  /* ─── summary ─── */
  .summary-box{text-align:center; padding:28px 22px; background:var(--surface);
    border-radius:16px; border:2px solid var(--border); max-width:480px; margin:20px auto;}
  .summary-box .big{font-size:48px; margin:8px 0;}
  .summary-box .lbl{font-size:14px; color:var(--muted); margin-top:4px;}
  .summary-btn-row{display:flex; gap:10px; justify-content:center; margin-top:20px; flex-wrap:wrap;}
  .summary-btn-row button{padding:10px 18px; border-radius:10px; border:2px solid var(--info);
    background:var(--bg); color:var(--info); font-family:inherit; font-size:14px; font-weight:700;
    cursor:pointer;}
  .summary-btn-row button.primary{background:var(--info); color:#fff;}
</style>
  <script id="mathjax-config">
  window.MathJax = {
    tex: { inlineMath: [['$','$'], ['\(','\)']],
           displayMath: [['$$','$$'], ['\[','\]']],
           processEscapes: true },
    options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] },
    startup: {
      pageReady: function () {
        return MathJax.startup.defaultPageReady().then(function () {
          var obs = new MutationObserver(function () {
            MathJax.typesetPromise().catch(function (e) { console.warn('MathJax err', e); });
          });
          obs.observe(document.body, { childList: true, subtree: true, characterData: true });
        });
      }
    }
  };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body>

<!-- ═══════════════ HOME SCREEN ═══════════════ -->
<div class="screen active" id="home-screen">
  <h1 class="home-title">🃏 کارت‌های حافظه — فصل ۲ (یازدهم)</h1>
  <p class="home-sub">یه راهِ سرگرم‌کننده برای مرور مفاهیمِ کلیدی فصلِ جریان الکتریکی و مدارها — همه‌ی ۶ زیرفصل</p>
  <div class="mode-grid">
    <button class="mode-card" data-mode="flash">
      <div class="mode-icon">🎴</div>
      <div class="mode-name">مرور کارت‌ها</div>
      <div class="mode-desc">با خودت چک کن. کارت رو ببین، فکر کن، جوابو نگاه کن، بگو بلد بودی یا نه. حافظه‌ت رو می‌سازه.</div>
    </button>
    <button class="mode-card" data-mode="quiz">
      <div class="mode-icon">🎮</div>
      <div class="mode-name">بازی سریع</div>
      <div class="mode-desc">۱۰ سؤال، ۲۰ ثانیه برای هر کدوم، چهار گزینه. امتیاز و streak. تستِ سرعتِ ذهن!</div>
    </button>
  </div>
  <div class="stats-row" id="stats-row"></div>
</div>

<!-- ═══════════════ FLASHCARD SCREEN ═══════════════ -->
<div class="screen" id="flash-screen">
  <div class="top-bar">
    <button class="btn-back" data-back>← خانه</button>
    <span class="progress-info" id="flash-progress">کارت ۱ از ۸</span>
  </div>
  <div class="card-wrap">
    <div class="progress-bar"><div id="flash-bar" style="width:0%"></div></div>
    <div class="flashcard" id="flash-card">
      <div class="card-inner">
        <div class="card-face front">
          <div class="card-q" id="flash-q"></div>
          <div class="card-tap">👇 برای دیدن جواب، روی کارت کلیک کن</div>
        </div>
        <div class="card-face back">
          <div class="card-a-label">✓ پاسخ</div>
          <div class="card-a" id="flash-a"></div>
        </div>
      </div>
    </div>
    <div class="rate-row">
      <button class="btn-rate no"  id="rate-no"  disabled>✗ بلد نبودم</button>
      <button class="btn-rate yes" id="rate-yes" disabled>✓ بلد بودم</button>
    </div>
  </div>
</div>

<!-- ═══════════════ QUIZ SCREEN ═══════════════ -->
<div class="screen" id="quiz-screen">
  <div class="top-bar">
    <button class="btn-back" data-back>← خانه</button>
    <span class="progress-info" id="quiz-progress">سؤال ۱ از ۱۰</span>
  </div>
  <div class="quiz-header">
    <div class="quiz-stat"><span class="sl">امتیاز</span><b id="quiz-score">۰</b></div>
    <div class="quiz-stat"><span class="sl">🔥 streak</span><b id="quiz-streak">۰</b></div>
    <div class="quiz-stat"><span class="sl">⏱ زمان</span><b id="quiz-time">۲۰</b></div>
  </div>
  <div class="timer-bar"><div id="timer-bar-fill" style="width:100%"></div></div>
  <div class="quiz-q" id="quiz-q"></div>
  <div class="choices" id="quiz-choices"></div>
  <div id="quiz-feedback"></div>
  <button class="btn-next-q" id="quiz-next" style="display:none">سؤال بعدی →</button>
</div>

<!-- ═══════════════ SUMMARY SCREEN ═══════════════ -->
<div class="screen" id="summary-screen">
  <div class="summary-box" id="summary-content"></div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// مجموعه کارت‌های فصل ۱
// هر کارت یه ساختار واحد داره — هم برای flashcard کار می‌کنه (q + a)
// و هم برای quiz (q + choices + correctIdx). توضیح a برای بازخورد quiz.
// ════════════════════════════════════════════════════════════
var CARDS = [
  // ---- ۲-۱: جریان الکتریکی ----
  { q: "جریانِ الکتریکی $I$ چجوری تعریف می‌شه؟",
    a: "آهنگِ عبورِ بار از یه مقطع: $I = \\dfrac{\\Delta q}{\\Delta t}$. واحدش <b>آمپر</b> (A) = کولن بر ثانیه‌ست.",
    choices: ["I = q·t", "I = q/t", "I = qt²", "I = t/q"],
    correctIdx: 1, topic: "۲-۱ جریان" },
  { q: "جهتِ قراردادیِ جریان در یک سیم چیه؟",
    a: "جهتِ حرکتِ بارهای <b>مثبت</b>. ولی در واقعیت در رساناهای فلزی، الکترون‌ها (منفی) در جهتِ مخالف حرکت می‌کنن. این قرارداد از زمانِ فرانکلین مونده.",
    choices: ["جهتِ الکترون‌ها",
              "جهتِ بارهای مثبت (قراردادی)",
              "هر دو جهت",
              "هیچ جهتی"],
    correctIdx: 1, topic: "۲-۱ جهت جریان" },
  { q: "اگه ۱ کولن بار در ۲ ثانیه از مقطعِ سیم بگذره، جریان چقدره؟",
    a: "$I = q/t = ۱/۲ = ۰{,}۵$ آمپر",
    choices: ["۲ A", "۰٫۵ A", "۱ A", "۰٫۲۵ A"],
    correctIdx: 1, topic: "۲-۱ محاسبه", time: 30 },

  // ---- ۲-۲: مقاومت و قانون اهم ----
  { q: "قانون اهم چی می‌گه؟",
    a: "برای رساناهای اهمی: $V = IR$ — اختلاف پتانسیلِ دو سرِ رسانا با جریان متناسبه، ضریبِ تناسب همون مقاومتِ $R$ ـه.",
    choices: ["V = I/R", "V = IR", "V = I+R", "V = I²R"],
    correctIdx: 1, topic: "۲-۲ قانون اهم", time: 30 },
  { q: "واحدِ مقاومتِ الکتریکی در SI چیه؟",
    a: "<b>اهم</b> ($\\Omega$) = ولت بر آمپر. $۱\\,\\Omega = ۱\\,\\text{V}/۱\\,\\text{A}$.",
    choices: ["ولت", "آمپر", "اهم (Ω)", "وات"],
    correctIdx: 2, topic: "۲-۲ یکا" },
  { q: "اگه به مقاومتِ $۱۰\\,\\Omega$ ولتاژِ $۲۰\\,\\text{V}$ بدیم، جریان چقدر می‌شه؟",
    a: "$I = V/R = ۲۰/۱۰ = ۲$ آمپر",
    choices: ["۲ A", "۰٫۵ A", "۲۰۰ A", "۱۰ A"],
    correctIdx: 0, topic: "۲-۲ محاسبه", time: 30 },
  { q: "تفاوتِ رساناهای «اهمی» با «غیراهمی» چیه؟",
    a: "اهمی: نمودارِ $V$-$I$ خطّ مستقیمه (R ثابت). غیراهمی مثل لامپ یا دیود، نمودار خمیده‌ست (R با ولتاژ/دما تغییر می‌کنه).",
    choices: ["اهمی نمودارش منحنیه",
              "اهمی نمودارش خطّ مستقیمه",
              "هر دو یکی‌اند",
              "هیچ‌کدوم نمودار ندارن"],
    correctIdx: 1, topic: "۲-۲ اهمی/غیراهمی" },

  // ---- ۲-۳: مقاومت ویژه ----
  { q: "مقاومتِ یک سیم به چه عواملی بستگی داره؟",
    a: "$R = \\rho \\dfrac{L}{A}$ — متناسب با طول $L$، عکسِ مساحتِ مقطع $A$. $\\rho$ مقاومتِ ویژه (خاصیتِ ماده) ـه.",
    choices: ["فقط طول", "فقط مقطع",
              "$\\rho L/A$", "$L \\cdot A$"],
    correctIdx: 2, topic: "۲-۳ مقاومت ویژه", time: 45 },
  { q: "اگه طولِ یه سیم رو ۲ برابر کنیم (سطحِ مقطع ثابت)، مقاومت چقدر می‌شه؟",
    a: "۲ برابر — $R \\propto L$. سیمِ بلندتر، مقاومتِ بیشتر.",
    choices: ["نصف", "۲ برابر", "۴ برابر", "تغییر نمی‌کنه"],
    correctIdx: 1, topic: "۲-۳ اثر طول", time: 30 },
  { q: "اگه شعاعِ سیم رو ۲ برابر کنیم، مقاومت چی می‌شه؟",
    a: "یک‌چهارم — $A = \\pi r^2$، با ۲ برابر شدنِ $r$، مقطع ۴ برابر می‌شه، پس $R$ یک‌چهارم.",
    choices: ["۲ برابر", "نصف",
              "یک‌چهارم", "۴ برابر"],
    correctIdx: 2, topic: "۲-۳ اثر مقطع", time: 45 },
  { q: "با افزایشِ دما، مقاومتِ یک سیمِ فلزی چه تغییری می‌کنه؟",
    a: "زیاد می‌شه — اتم‌های شبکه با دامنه‌ی بزرگ‌تر می‌لرزن و الکترون‌ها برخوردهای بیشتری دارن. ولی نیمه‌رساناها برعکس‌اند: مقاومتشون با دما کم می‌شه.",
    choices: ["تغییر نمی‌کنه", "زیاد می‌شه",
              "کم می‌شه", "صفر می‌شه"],
    correctIdx: 1, topic: "۲-۳ اثر دما" },

  // ---- ۲-۴: نیروی محرکه ----
  { q: "نیروی محرکه‌ی الکتریکی ($\\varepsilon$) چیه؟",
    a: "انرژیی که منبع به ازای هر کولن بار به مدار می‌ده. واحدش <b>ولت</b> ـه. این یک «نیرو» نیست — بلکه انرژی به ازای بار.",
    choices: ["نیروی مکانیکی روی بار",
              "انرژی به ازای واحد بار",
              "جریان", "مقاومت"],
    correctIdx: 1, topic: "۲-۴ EMF" },
  { q: "اختلاف پتانسیلِ دو سرِ یک باتری ($V$) چه ربطی به EMF ($\\varepsilon$) داره؟",
    a: "$V = \\varepsilon - Ir$ — وقتی جریانی از باتری می‌گذره، اُفتِ ولتاژ روی مقاومتِ داخلی $r$ از EMF کم می‌شه. در حالتِ مدارِ باز ($I=0$): $V = \\varepsilon$.",
    choices: ["V = ε + Ir", "V = ε - Ir",
              "V = εI", "V = ε/r"],
    correctIdx: 1, topic: "۲-۴ ولتاژ دو سر باتری", time: 45 },
  { q: "مقاومتِ داخلیِ $r$ چیه و چرا مهمه؟",
    a: "مقاومتِ ذاتیِ خودِ منبع (الکترولیت/مواد داخلی باتری). هرچه بیشتر باشه، باتری «ضعیف‌تر» ـه — ولتاژِ دو سرش با کشیدنِ جریان سریع‌تر افت می‌کنه. باتری‌های کهنه $r$ بزرگی دارن.",
    choices: ["مقاومتِ سیم‌های بیرونی",
              "مقاومتِ ذاتیِ باتری",
              "مقاومتِ هوا",
              "صفره همیشه"],
    correctIdx: 1, topic: "۲-۴ مقاومت داخلی" },
  { q: "جریانِ کلِ مدارِ ساده با باتری ($\\varepsilon$, $r$) و مقاومت خارجی $R$ چقدره؟",
    a: "$I = \\dfrac{\\varepsilon}{R + r}$ — کلِّ EMF تقسیم بر کلِّ مقاومتِ مدار (داخلی + خارجی).",
    choices: ["ε/R", "ε/(R+r)",
              "ε/(R-r)", "εR"],
    correctIdx: 1, topic: "۲-۴ قانون کیرشهف", time: 30 },

  // ---- ۲-۵: توان الکتریکی ----
  { q: "توانِ الکتریکیِ مصرف‌شده در یه عنصر چجوری حساب می‌شه؟",
    a: "$P = VI = I^2R = \\dfrac{V^2}{R}$ — سه فرمولِ معادل. واحدش <b>وات</b> (W) = ژول بر ثانیه‌ست.",
    choices: ["P = V+I", "P = V·I",
              "P = V/I", "P = V-I"],

// ════════════════════════════════════════════════════════════
// STATE & STORAGE
// ════════════════════════════════════════════════════════════
var STORAGE_KEY = "pm_flashcards_y11_fasl_2";
function loadProgress(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e){ return {}; } }
function saveProgress(p){ try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch(e){} }
function faNum(n){ var m={"0":"۰","1":"۱","2":"۲","3":"۳","4":"۴","5":"۵","6":"۶","7":"۷","8":"۸","9":"۹"}; return String(n).split("").map(function(c){return m[c]||c;}).join(""); }

function showScreen(id){
  document.querySelectorAll(".screen").forEach(function(s){ s.classList.remove("active"); });
  document.getElementById(id).classList.add("active");
  // resize-notify parent
  setTimeout(function(){ try { window.parent.postMessage({pmEvent:"screen-change"},"*"); } catch(e){} }, 50);
}

// ════════════════════════════════════════════════════════════
// HOME SCREEN
// ════════════════════════════════════════════════════════════
function renderHomeStats(){
  var p = loadProgress();
  var known = (p.knownIds||[]).length;
  var bestScore = p.bestScore || 0;
  var row = document.getElementById("stats-row");
  row.innerHTML = '<div class="stat">کارت بلد: <b>' + faNum(known) + '/' + faNum(CARDS.length) + '</b></div>'
                + '<div class="stat">🏆 بهترین امتیاز: <b>' + faNum(bestScore) + '</b></div>';
}

document.querySelectorAll(".mode-card").forEach(function(b){
  b.addEventListener("click", function(){
    var m = b.dataset.mode;
    if(m === "flash") startFlash();
    if(m === "quiz")  startQuiz();
  });
});
document.querySelectorAll("[data-back]").forEach(function(b){
  b.addEventListener("click", function(){ showScreen("home-screen"); renderHomeStats(); });
});

// ════════════════════════════════════════════════════════════
// FLASHCARD MODE
// ════════════════════════════════════════════════════════════
var flashOrder = [];
var flashIdx   = 0;
var flashAnswered = false;
var flashStats = {right:0, wrong:0};

function startFlash(){
  flashOrder = shuffle(CARDS.map(function(_,i){return i;}));
  flashIdx = 0;
  flashStats = {right:0, wrong:0};
  showScreen("flash-screen");
  renderFlash();
}

function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}

function renderFlash(){
  var c = CARDS[flashOrder[flashIdx]];
  document.getElementById("flash-q").innerHTML = c.q;
  document.getElementById("flash-a").innerHTML = c.a;
  document.getElementById("flash-card").classList.remove("flipped");
  document.getElementById("flash-progress").innerHTML = "کارت " + faNum(flashIdx+1) + " از " + faNum(flashOrder.length);
  document.getElementById("flash-bar").style.width = ((flashIdx)/flashOrder.length*100) + "%";
  document.getElementById("rate-no").disabled = true;
  document.getElementById("rate-yes").disabled = true;
  flashAnswered = false;
}

document.getElementById("flash-card").addEventListener("click", function(){
  this.classList.toggle("flipped");
  if(this.classList.contains("flipped")){
    document.getElementById("rate-no").disabled  = false;
    document.getElementById("rate-yes").disabled = false;
  }
});

["no","yes"].forEach(function(side){
  document.getElementById("rate-"+side).addEventListener("click", function(){
    if(flashAnswered) return; flashAnswered = true;
    if(side==="yes"){
      flashStats.right++;
      var p = loadProgress(); var known = (p.knownIds||[]);
      var id = flashOrder[flashIdx];
      if(known.indexOf(id) === -1) known.push(id);
      p.knownIds = known; saveProgress(p);
    } else {
      flashStats.wrong++;
      // مجدد در آخرِ deck
      flashOrder.push(flashOrder[flashIdx]);
    }
    flashIdx++;
    if(flashIdx >= flashOrder.length){
      showFlashSummary();
    } else {
      renderFlash();
    }
  });
});

function showFlashSummary(){
  showScreen("summary-screen");
  document.getElementById("flash-bar").style.width = "100%";
  var box = document.getElementById("summary-content");
  var p = loadProgress(); var known = (p.knownIds||[]).length;
  box.innerHTML =
    '<div class="big">🎉</div>'
    + '<div style="font-size:22px; font-weight:700; margin-bottom:14px">مرور کارت‌ها تمام شد!</div>'
    + '<div style="font-size:15px; color:var(--muted); line-height:2">'
    + 'این بار <b style="color:var(--ok)">' + faNum(flashStats.right) + '</b> کارت رو بلد بودی و '
    + '<b style="color:var(--bad)">' + faNum(flashStats.wrong) + '</b> کارت نیاز به مرور داره.'
    + '<br>روی هم، <b style="color:var(--info)">' + faNum(known) + '</b> کارت از <b>' + faNum(CARDS.length)
    + '</b> رو در حافظه‌ت ذخیره کردی.</div>'
    + '<div class="summary-btn-row">'
    + '<button class="primary" onclick="startFlash()">دوباره مرور</button>'
    + '<button onclick="document.querySelector(\'[data-back]\').click()">← خانه</button>'
    + '</div>';
}

// ════════════════════════════════════════════════════════════
// QUIZ MODE
// ════════════════════════════════════════════════════════════
var QUIZ_LEN = 10;
var DEFAULT_TIME = 20;
var quizOrder = []; var quizIdx = 0; var quizScore = 0; var quizStreak = 0;
var timerInterval = null; var quizTimeLeft = DEFAULT_TIME; var currentTimeLimit = DEFAULT_TIME;

function startQuiz(){
  quizOrder = shuffle(CARDS.map(function(_,i){return i;})).slice(0, Math.min(QUIZ_LEN, CARDS.length));
  quizIdx = 0; quizScore = 0; quizStreak = 0;
  showScreen("quiz-screen");
  renderQuiz();
}

function renderQuiz(){
  var c = CARDS[quizOrder[quizIdx]];
  document.getElementById("quiz-q").innerHTML = c.q;
  document.getElementById("quiz-progress").innerHTML = "سؤال " + faNum(quizIdx+1) + " از " + faNum(quizOrder.length);
  document.getElementById("quiz-score").innerHTML  = faNum(quizScore);
  document.getElementById("quiz-streak").innerHTML = faNum(quizStreak);
  document.getElementById("quiz-feedback").innerHTML = "";
  document.getElementById("quiz-next").style.display = "none";

  var box = document.getElementById("quiz-choices");
  box.innerHTML = "";
  c.choices.forEach(function(text, i){
    var btn = document.createElement("button");
    btn.className = "choice";
    btn.innerHTML = '<span style="display:inline-block;min-width:24px;font-weight:700;color:var(--muted)">' + (faNum(i+1)) + '.</span> ' + text;
    btn.addEventListener("click", (function(idx){ return function(){ answerQuiz(idx); }; })(i));
    box.appendChild(btn);
  });

  startTimer();
}

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);
  var c = CARDS[quizOrder[quizIdx]];
  currentTimeLimit = c.time || DEFAULT_TIME;     // per-card time limit
  quizTimeLeft = currentTimeLimit;
  document.getElementById("quiz-time").innerHTML = faNum(quizTimeLeft);
  document.getElementById("timer-bar-fill").style.width = "100%";
  timerInterval = setInterval(function(){
    quizTimeLeft--;
    document.getElementById("quiz-time").innerHTML = faNum(Math.max(0,quizTimeLeft));
    document.getElementById("timer-bar-fill").style.width = (quizTimeLeft/currentTimeLimit*100) + "%";
    if(quizTimeLeft <= 0){ clearInterval(timerInterval); answerQuiz(-1); }
  }, 1000);
}

function answerQuiz(chosenIdx){
  if(timerInterval) clearInterval(timerInterval);
  var c = CARDS[quizOrder[quizIdx]];
  var correct = (chosenIdx === c.correctIdx);
  var buttons = document.querySelectorAll(".choices .choice");
  buttons.forEach(function(b,i){
    b.disabled = true;
    if(i === c.correctIdx) b.classList.add("correct");
    if(i === chosenIdx && !correct) b.classList.add("wrong");
  });
  var fb = document.getElementById("quiz-feedback");
  if(correct){
    quizScore += 10 + Math.max(0, quizTimeLeft); // speed bonus
    quizStreak++;
    if(quizStreak >= 3) quizScore += 5; // streak bonus
    fb.className = "feedback ok";
    fb.innerHTML = "✓ <b>درست!</b> " + c.a + (quizStreak>=3 ? "  🔥 streak ×"+faNum(quizStreak) : "");
  } else {
    quizStreak = 0;
    fb.className = "feedback bad";
    if(chosenIdx === -1){
      fb.innerHTML = "⏱ <b>زمان تمام شد!</b> پاسخ درست: <i>" + c.a + "</i>";
    } else {
      fb.innerHTML = "✗ <b>اشتباه.</b> پاسخ درست: <i>" + c.a + "</i>";
    }
  }
  document.getElementById("quiz-score").innerHTML  = faNum(quizScore);
  document.getElementById("quiz-streak").innerHTML = faNum(quizStreak);
  document.getElementById("quiz-next").style.display = "";
  document.getElementById("quiz-next").textContent = (quizIdx+1 >= quizOrder.length) ? "نمایش نتیجه ←" : "سؤال بعدی →";
}

document.getElementById("quiz-next").addEventListener("click", function(){
  quizIdx++;
  if(quizIdx >= quizOrder.length){
    showQuizSummary();
  } else {
    renderQuiz();
  }
});

function showQuizSummary(){
  showScreen("summary-screen");
  var p = loadProgress();
  var best = Math.max(p.bestScore || 0, quizScore);
  p.bestScore = best; saveProgress(p);
  var emoji = quizScore >= 200 ? "🏆" : quizScore >= 120 ? "🎯" : quizScore >= 60 ? "👍" : "💪";
  var msg   = quizScore >= 200 ? "فوق‌العاده! تو فیزیک‌دونی!"
            : quizScore >= 120 ? "خیلی خوبه! ادامه بده."
            : quizScore >= 60  ? "خوب بود، با یه مرور دوباره بهتر می‌شی."
            :                    "اشکالی نداره — یه دور مرور کارت‌ها بزن!";
  document.getElementById("summary-content").innerHTML =
    '<div class="big">' + emoji + '</div>'
    + '<div style="font-size:18px; color:var(--muted)">امتیاز این بار</div>'
    + '<div style="font-size:48px; font-weight:800; color:var(--info); margin:4px 0">' + faNum(quizScore) + '</div>'
    + '<div class="lbl">🏆 بهترین امتیاز: ' + faNum(best) + '</div>'
    + '<div style="font-size:15px; color:var(--text); margin-top:14px">' + msg + '</div>'
    + '<div class="summary-btn-row">'
    + '<button class="primary" onclick="startQuiz()">یه بار دیگه</button>'
    + '<button onclick="document.querySelector(\'[data-back]\').click()">← خانه</button>'
    + '</div>';
}

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
renderHomeStats();
