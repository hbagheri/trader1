<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قانون سوم نیوتون — کنش و واکنش</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --surface:#f4f3ef; --text:#1a1a18; --muted:#5f5e5a;
    --border:#e0ded7; --info:#185fa5; --info-bg:#e6f1fb;
    --ok:#1d9e75; --warn:#a87800; --primary:#185fa5; --secondary:#c43838;
    --accent:#9CAB52; --sky:#e6f1fb; --ground:#bba382;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1f1e1c; --surface:#2a2926; --text:#f0efe9; --muted:#a8a69e;
      --border:#3a3835; --info:#85b7eb; --info-bg:#0c447c;
      --primary:#85b7eb; --secondary:#f06a60; --sky:#1a2a3a; --ground:#4a3a2a;
    }
  }
  *{box-sizing:border-box;}
  body{margin:0; padding:14px; background:var(--bg); color:var(--text);
       font-family:Vazirmatn, Tahoma, system-ui, sans-serif; line-height:1.6;}
  .wrap{max-width:880px; margin:0 auto;}
  h2{margin:0 0 4px; font-size:17px;}
  .sub{font-size:12.5px; color:var(--muted); margin:0 0 12px;}
  .layout{display:grid; grid-template-columns:1fr 240px; gap:12px;}
  @media(max-width:700px){.layout{grid-template-columns:1fr;}}
  .stage{background:linear-gradient(to bottom, var(--sky), var(--bg)); border:1px solid var(--border); border-radius:14px; overflow:hidden;}
  canvas{display:block; width:100%; height:380px;}
  .panel{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px;}
  .panel h3{font-size:13px; margin:8px 0 6px; color:var(--muted); text-transform:uppercase;}
  .panel h3:first-child{margin-top:0;}
  .scene-buttons{display:grid; grid-template-columns:1fr; gap:6px;}
  .scene-btn{background:var(--bg); color:var(--text); border:1px solid var(--border); padding:8px 12px; border-radius:8px; cursor:pointer; font-family:inherit; font-size:13px; text-align:right;}
  .scene-btn.active{background:var(--info-bg); color:var(--info); border-color:var(--info);}
  .desc{padding:10px; background:var(--info-bg); color:var(--info); border-radius:8px; font-size:13px; margin-top:10px;}
  .legend{font-size:12.5px; padding:8px; background:var(--surface); border-top:1px solid var(--border); display:flex; flex-wrap:wrap; gap:10px; justify-content:center;}
  .legend span{display:inline-flex; align-items:center; gap:4px;}
  .legend i{display:inline-block; width:18px; height:3px;}
</style>
<script id="mathjax-config">
window.MathJax = {
  tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$']], processEscapes: true },
  options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] },
  startup: {
    pageReady: function () {
      return MathJax.startup.defaultPageReady().then(function () {
        var obs = new MutationObserver(function () {
          MathJax.typesetPromise().catch(function (e) { console.warn('MathJax err', e); });
        });
        obs.observe(document.body, { childList: true, subtree: true, characterData: true });
      });
    }
  }
};
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script"></script>
</head>
<body>
<div class="wrap">
  <h2>قانون سوم نیوتون — کنش و واکنش 🤝</h2>
  <p class="sub">یک صحنه انتخاب کن — نیروهای کنش و واکنش (هم‌اندازه، خلاف جهت، روی دو جسم متفاوت) رو ببین.</p>

  <div class="layout">
    <div class="stage">
      <canvas id="cv"></canvas>
      <div class="legend">
        <span><i style="background:#1d9e75"></i> نیروی A بر B (کنش)</span>
        <span><i style="background:#c43838"></i> نیروی B بر A (واکنش)</span>
      </div>
    </div>
    <div class="panel">
      <h3>صحنه‌ها</h3>
      <div class="scene-buttons">
        <button class="scene-btn active" data-s="0">🚶 پیاده‌رو روی زمین</button>
        <button class="scene-btn" data-s="1">🍎 سیب و زمین</button>
        <button class="scene-btn" data-s="2">🚀 موشک و گاز</button>
        <button class="scene-btn" data-s="3">🐟 شناگر و آب</button>
        <button class="scene-btn" data-s="4">📚 کتاب روی میز</button>
      </div>
      <div class="desc" id="desc"></div>
    </div>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 600, H = 380;
function resize(){
  const r = cv.getBoundingClientRect();
  W = cv.width = r.width * devicePixelRatio;
  H = cv.height = r.height * devicePixelRatio;
  cv.style.height = '380px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
resize(); window.addEventListener('resize', resize);

let scene = 0;
let t = 0;

const scenes = [
  {
    name: 'پیاده‌رو روی زمین',
    desc: 'پای پیاده‌رو زمین رو به <b>عقب</b> هل می‌ده (نیروی A→B). زمین هم پیاده‌رو رو به <b>جلو</b> هل می‌ده (نیروی B→A). همین نیروی واکنش، پیاده رو به جلو می‌بره. $\\vec{F}_{AB} = -\\vec{F}_{BA}$'
  },
  {
    name: 'سیب و زمین',
    desc: 'زمین سیب رو با گرانش به سمتِ خودش می‌کشه (وزن سیب). سیب هم زمین رو با همون اندازه می‌کشه! ولی چون جرم زمین خیلی زیاده، شتابش تقریباً صفره.'
  },
  {
    name: 'موشک و گاز',
    desc: 'موشک گاز داغ رو به <b>پایین</b> فوران می‌کنه. گاز هم موشک رو به <b>بالا</b> هل می‌ده. این چرا موشک می‌تونه توی فضای خالی (بدون چیزی برای فشار آوردن) حرکت کنه!'
  },
  {
    name: 'شناگر و آب',
    desc: 'شناگر دستش رو آب رو به <b>عقب</b> هل می‌ده. آب هم شناگر رو به <b>جلو</b> هل می‌ده. سرعت‌گیری توی آب فقط با نیروی واکنش ممکنه.'
  },
  {
    name: 'کتاب روی میز',
    desc: 'کتاب میز رو به پایین فشار می‌ده (وزنش). میز کتاب رو به بالا فشار می‌ده (نیروی نرمال). این جفتِ کنش-واکنشه. <b>توجه:</b> نیروی نرمال میز جفتِ سومِ وزن نیست — جفتِ وزن، گرانشِ کتاب روی زمینه!'
  }
];

function arrow(x1,y1,x2,y2,color,label,offY){
  ctx.strokeStyle = color; ctx.fillStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  const ang = Math.atan2(y2-y1, x2-x1);
  const ah = 10;
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2 - ah*Math.cos(ang - 0.4), y2 - ah*Math.sin(ang - 0.4));
  ctx.lineTo(x2 - ah*Math.cos(ang + 0.4), y2 - ah*Math.sin(ang + 0.4));
  ctx.closePath(); ctx.fill();
  if (label) {
    ctx.font = 'bold 13px Vazirmatn';
    ctx.fillText(label, (x1+x2)/2 - 25, (y1+y2)/2 + (offY||-8));
  }
}

function draw(){
  const W = cv.clientWidth, H = 380;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = 'var(--ground)';

  if (scene === 0) { // walker
    // ground
    ctx.fillStyle = '#bba382';
    ctx.fillRect(0, H-60, W, 60);
    ctx.font = '90px serif';
    ctx.fillText('🚶', W/2 - 50, H-70);
    // arrows: foot pushes ground back, ground pushes foot forward
    arrow(W/2, H-55, W/2 - 80, H-55, '#1d9e75', 'پا → زمین', 18);
    arrow(W/2 + 20, H-90, W/2 + 100, H-90, '#c43838', 'زمین → پا', -10);
  } else if (scene === 1) { // apple & earth
    // earth
    ctx.fillStyle = '#185fa5';
    ctx.beginPath(); ctx.arc(W/2, H-30, 80, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Vazirmatn';
    ctx.fillText('زمین', W/2 - 20, H-25);
    // apple
    ctx.font = '50px serif';
    ctx.fillText('🍎', W/2 - 25, H-180);
    // gravity arrow on apple downward
    arrow(W/2, H-200, W/2, H-130, '#1d9e75', 'زمین → سیب', 0);
    // reaction on earth upward
    arrow(W/2 + 80, H-90, W/2 + 80, H-160, '#c43838', 'سیب → زمین', 0);
  } else if (scene === 2) { // rocket
    ctx.fillStyle = '#444';
    ctx.fillRect(W/2-20, H-300+Math.sin(t)*5, 40, 160);
    ctx.fillStyle = '#c43838';
    ctx.beginPath(); ctx.moveTo(W/2-20,H-300+Math.sin(t)*5); ctx.lineTo(W/2,H-340+Math.sin(t)*5); ctx.lineTo(W/2+20,H-300+Math.sin(t)*5); ctx.fill();
    // gas
    ctx.fillStyle = '#ffaa3a';
    for (let i=0;i<20;i++){
      const ox = W/2 - 20 + Math.random()*40;
      const oy = H - 140 + Math.sin(t)*5 + Math.random()*60;
      ctx.beginPath(); ctx.arc(ox,oy,4+Math.random()*3,0,Math.PI*2); ctx.fill();
    }
    arrow(W/2, H-220, W/2, H-130, '#1d9e75', 'موشک → گاز', 0);
    arrow(W/2 + 80, H-280, W/2 + 80, H-360, '#c43838', 'گاز → موشک', 0);
  } else if (scene === 3) { // swimmer
    ctx.fillStyle = '#bbd9f5';
    ctx.fillRect(0, H-130, W, 130);
    ctx.font = '80px serif';
    ctx.fillText('🏊', W/2-40, H-50);
    arrow(W/2-30, H-90, W/2-110, H-90, '#1d9e75', 'دست → آب', -10);
    arrow(W/2+50, H-90, W/2+130, H-90, '#c43838', 'آب → شناگر', -10);
  } else if (scene === 4) { // book
    ctx.fillStyle = '#bba382';
    ctx.fillRect(W/2-150, H-100, 300, 20);
    ctx.fillRect(W/2-140, H-80, 10, 80);
    ctx.fillRect(W/2+130, H-80, 10, 80);
    ctx.fillStyle = '#c43838';
    ctx.fillRect(W/2-50, H-130, 100, 30);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Vazirmatn';
    ctx.fillText('کتاب', W/2-15, H-110);
    // book pushes table down (action)
    arrow(W/2-60, H-100, W/2-60, H-50, '#1d9e75', 'کتاب → میز', 5);
    // table pushes book up (reaction)
    arrow(W/2+60, H-100, W/2+60, H-160, '#c43838', 'میز → کتاب', 0);
  }
  t += 0.03;
  requestAnimationFrame(draw);
}

document.querySelectorAll('.scene-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.scene-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    scene = +b.dataset.s;
    document.getElementById('desc').innerHTML = scenes[scene].desc;
  });
});
document.getElementById('desc').innerHTML = scenes[0].desc;
draw();
</script>
</body>
</html>
