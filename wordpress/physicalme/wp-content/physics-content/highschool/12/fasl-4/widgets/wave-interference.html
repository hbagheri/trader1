<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تداخل دو چشمه — مخزن موج</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --surface:#f4f3ef; --text:#1a1a18; --muted:#5f5e5a;
    --border:#e0ded7; --info:#185fa5; --info-bg:#e6f1fb;
    --ok:#1d9e75; --ok-bg:#e3f5ed;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1f1e1c; --surface:#2a2926; --text:#f0efe9; --muted:#a8a69e;
      --border:#3a3835; --info:#85b7eb; --info-bg:#0c447c;
      --ok:#5dcaa5; --ok-bg:#1a4a35;
    }
  }
  *{box-sizing:border-box;}
  body{margin:0; padding:14px; background:var(--bg); color:var(--text);
       font-family:Vazirmatn, Tahoma, system-ui, sans-serif; line-height:1.6;}
  .wrap{max-width:980px; margin:0 auto;}
  h2{margin:0 0 4px; font-size:17px;}
  .sub{font-size:12.5px; color:var(--muted); margin:0 0 12px;}
  .layout{display:grid; grid-template-columns:1fr 240px; gap:12px;}
  @media(max-width:760px){.layout{grid-template-columns:1fr;}}
  .stage{background:#06070d; border:1px solid var(--border); border-radius:14px; padding:8px;}
  canvas{display:block; width:100%; height:380px;}
  .panel{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px;}
  .panel h3{font-size:13px; margin:8px 0 6px; color:var(--muted); text-transform:uppercase;}
  .panel h3:first-child{margin-top:0;}
  .slider-row{display:grid; grid-template-columns:1fr 60px; gap:6px; align-items:center; font-size:13px; margin-bottom:4px;}
  .val{font-weight:700; color:var(--info); text-align:left; font-variant-numeric:tabular-nums;}
  input[type=range]{width:100%; accent-color:var(--info);}
  .btn{background:var(--info); color:white; border:none; padding:8px 14px; border-radius:8px; font-family:inherit; font-size:13px; cursor:pointer; width:100%; margin-top:6px;}
  .btn.alt{background:#5dcaa5;}
  .note{font-size:12px; padding:8px; background:var(--ok-bg); color:var(--ok); border-radius:8px; margin-top:8px; line-height:1.6;}
  .ck{display:flex; align-items:center; gap:6px; font-size:12.5px; margin:4px 0;}
</style>
<script>
  window.MathJax = {
    tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']], processEscapes: true },
    startup: { pageReady: function () { return MathJax.startup.defaultPageReady().then(function () {
      var obs = new MutationObserver(function () { MathJax.typesetPromise().catch(function (e) { console.warn('MathJax err', e); }); });
      obs.observe(document.body, { childList: true, subtree: true, characterData: true });
    }); } }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body>
<div class="wrap">
  <h2>تداخل دو چشمه‌ی موج 🌊🌊 — مخزنِ موج</h2>
  <p class="sub">دو چشمه‌ی دایره‌ای روی سطحی موج می‌سازن. ببین کجا تداخل سازنده (روشن) و کجا ویرانگر (تیره) داریم. فاصله‌ی چشمه‌ها و طول موج رو تغییر بده.</p>

  <div class="layout">
    <div class="stage">
      <canvas id="cv"></canvas>
    </div>

    <div class="panel">
      <h3>پارامترها</h3>
      <div class="slider-row"><label>فاصله‌ی چشمه‌ها (px)</label><span class="val" id="vD">۱۲۰</span></div>
      <input type="range" id="D" min="40" max="240" step="10" value="120">

      <div class="slider-row"><label>طول موج $\lambda$ (px)</label><span class="val" id="vL">۴۰</span></div>
      <input type="range" id="L" min="15" max="100" step="2" value="40">

      <div class="slider-row"><label>سرعت انیمیشن</label><span class="val" id="vS">۱٫۰</span></div>
      <input type="range" id="S" min="0" max="3" step="0.1" value="1.0">

      <h3>نمایش</h3>
      <div class="ck"><input type="checkbox" id="cknodal" checked><label for="cknodal">خط‌های پسته‌ای (تداخل ویرانگر)</label></div>
      <div class="ck"><input type="checkbox" id="ckanti" checked><label for="ckanti">خط‌های شکم (تداخل سازنده)</label></div>
      <div class="ck"><input type="checkbox" id="ckphase"><label for="ckphase">اختلاف فاز ۱۸۰° (ناهم‌فاز)</label></div>

      <button class="btn" id="play">⏸ توقف</button>
      <button class="btn alt" id="snap">📸 عکسِ ثابت</button>

      <div class="note">
        💡 شرطِ تداخل سازنده: $|r_1-r_2| = m\lambda$<br>
        ویرانگر: $|r_1-r_2| = (m+\frac{1}{2})\lambda$
      </div>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const fa=n=>n.toLocaleString('fa-IR');
const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const cv=$('cv'), ctx=cv.getContext('2d');
let DPR=1;  // CPU-bound — keep DPR low
function fit(){const r=cv.getBoundingClientRect(); cv.width=r.width*DPR; cv.height=r.height*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); return {w:r.width, h:r.height};}

let D=120, lam=40, S=1.0;
let t=0, last=null, running=true;
let antiPhase=false;
let showNodal=true, showAnti=true;
let snap=false;

function draw(){
  const {w,h}=fit();
  const cy=h/2;
  const s1={x:w/2 - D/2, y:cy};
  const s2={x:w/2 + D/2, y:cy};
  const k = 2*Math.PI/lam;
  const omega = 2*Math.PI*S; // controls oscillation rate

  // raster image
  const img = ctx.createImageData(w, h);
  for(let py=0; py<h; py+=2){
    for(let px=0; px<w; px+=2){
      const r1 = Math.hypot(px-s1.x, py-s1.y);
      const r2 = Math.hypot(px-s2.x, py-s2.y);
      const phaseShift = antiPhase ? Math.PI : 0;
      const u = Math.cos(k*r1 - omega*t)/Math.max(8, r1/10) +
                Math.cos(k*r2 - omega*t + phaseShift)/Math.max(8, r2/10);
      const intensity = u * 60 + 130; // shift to 0-255
      const v = Math.max(0, Math.min(255, intensity));
      // color: dark blue valleys, white peaks
      const R = v*0.4, G = v*0.65, B = v;
      for(let dy=0; dy<2; dy++){
        for(let dx=0; dx<2; dx++){
          const idx=((py+dy)*w + (px+dx))*4;
          img.data[idx]=R; img.data[idx+1]=G; img.data[idx+2]=B; img.data[idx+3]=255;
        }
      }
    }
  }
  ctx.putImageData(img, 0, 0);

  // overlay nodal/antinodal lines (hyperbolas: |r1-r2|=const)
  if(showNodal || showAnti){
    ctx.lineWidth=1.2;
    for(let m=-6; m<=6; m++){
      let diff;
      if(antiPhase){
        diff = (m+0.5)*lam; // anti = sazandeh when out-of-phase
      } else {
        diff = m*lam;
      }
      const cx_h=(s1.x+s2.x)/2, cy_h=(s1.y+s2.y)/2;
      const cFocus = D/2;
      const aHyp = diff/2;
      if(Math.abs(aHyp) >= cFocus) continue;
      const bHyp2 = cFocus*cFocus - aHyp*aHyp;
      if(showAnti && m!==0 || (m===0 && showAnti && !antiPhase)){
        ctx.strokeStyle = 'rgba(120,255,160,0.55)';
      } else continue;
      // hyperbola: x^2/a^2 - y^2/b^2 = 1 (with foci on x-axis), centered at (cx_h, cy_h)
      ctx.beginPath();
      let drawn=false;
      for(let y=-h; y<=h; y+=2){
        const xa = Math.sign(aHyp) * Math.sqrt((y*y/bHyp2 + 1) * aHyp*aHyp);
        const px = cx_h + xa;
        const py = cy_h + y;
        if(px>=0 && px<=w){ if(!drawn){ ctx.moveTo(px,py); drawn=true;} else ctx.lineTo(px,py); }
      }
      ctx.stroke();
    }
    // nodal lines (destructive): half-integer for in-phase, integer for anti-phase
    if(showNodal){
      ctx.strokeStyle = 'rgba(255,140,140,0.55)';
      for(let m=-6; m<=6; m++){
        let diff;
        if(antiPhase) diff = m*lam;
        else diff = (m+0.5)*lam;
        const cx_h=(s1.x+s2.x)/2, cy_h=(s1.y+s2.y)/2;
        const cFocus=D/2;
        const aHyp=diff/2;
        if(Math.abs(aHyp) >= cFocus) continue;
        const bHyp2=cFocus*cFocus - aHyp*aHyp;
        ctx.beginPath();
        let drawn=false;
        for(let y=-h; y<=h; y+=2){
          const xa = Math.sign(aHyp) * Math.sqrt((y*y/bHyp2 + 1) * aHyp*aHyp);
          const px = cx_h + xa;
          const py = cy_h + y;
          if(px>=0 && px<=w){ if(!drawn){ ctx.moveTo(px,py); drawn=true;} else ctx.lineTo(px,py); }
        }
        ctx.stroke();
      }
    }
  }

  // draw sources
  ctx.fillStyle='#ffeb3b'; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(s1.x, s1.y, 7, 0, 2*Math.PI); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(s2.x, s2.y, 7, 0, 2*Math.PI); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='12px Vazirmatn'; ctx.textAlign='center';
  ctx.fillText('چشمه ۱', s1.x, s1.y-12);
  ctx.fillText('چشمه ۲', s2.x, s2.y-12);

  // legend
  ctx.font='11px Vazirmatn'; ctx.textAlign='left';
  ctx.fillStyle='rgba(120,255,160,0.95)'; ctx.fillText('— سازنده (شکم)', 10, h-26);
  ctx.fillStyle='rgba(255,140,140,0.95)'; ctx.fillText('— ویرانگر (گره)', 10, h-12);
}

function loop(now){
  if(!last) last=now;
  const dt=Math.min((now-last)/1000, 0.05);
  last=now;
  if(running && !snap) t+=dt;
  draw();
  requestAnimationFrame(loop);
}

['D','L','S'].forEach(id=>{
  $(id).addEventListener('input', e=>{
    const v=parseFloat(e.target.value);
    if(id==='D'){ D=v; $('vD').textContent=fa(v); }
    if(id==='L'){ lam=v; $('vL').textContent=fa(v); }
    if(id==='S'){ S=v; $('vS').textContent=fa(v.toFixed(1)); }
  });
});
$('cknodal').addEventListener('change', e=>{ showNodal=e.target.checked; });
$('ckanti').addEventListener('change', e=>{ showAnti=e.target.checked; });
$('ckphase').addEventListener('change', e=>{ antiPhase=e.target.checked; });
$('play').addEventListener('click', ()=>{ running=!running; $('play').textContent=running?'⏸ توقف':'▶ شروع'; last=null; });
$('snap').addEventListener('click', ()=>{ snap=!snap; $('snap').textContent=snap?'⏵ ادامه':'📸 عکسِ ثابت'; });
requestAnimationFrame(loop);
</script>
</body>
</html>
