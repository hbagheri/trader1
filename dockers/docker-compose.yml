name: ld-host

services:
  db:
    image: mariadb:11
    container_name: wp-db
    restart: unless-stopped
    networks:
      - wpnet
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ../mariadb/init:/docker-entrypoint-initdb.d

  ayimi:
    image: wordpress:latest
    container_name: wp-ayimi
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - wpnet
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${AYIMI_DB_USER}
      WORDPRESS_DB_PASSWORD: ${AYIMI_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${AYIMI_DB_NAME}
    volumes:
      - ../wordpress/ayimi:/var/www/html
    ports:
      - "127.0.0.1:50080:80"

  physicalme:
    image: wordpress:latest
    container_name: wp-physicalme
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - wpnet
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${PHYSICALME_DB_USER}
      WORDPRESS_DB_PASSWORD: ${PHYSICALME_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${PHYSICALME_DB_NAME}
    volumes:
      - ../wordpress/physicalme:/var/www/html
    ports:
      - "127.0.0.1:50081:80"

  learnarm-api:
    build:
      context: ../fastapi/learnArm
      dockerfile: Dockerfile
    container_name: ld-host-learnarm-api
    restart: unless-stopped
    networks:
      - wpnet
    volumes:
      - ../fastapi/learnArm/audio_cache:/app/audio_cache
    ports:
      - "127.0.0.1:50082:8000"
    profiles:
      - donotstart

  postgres:
    image: postgres:16
    container_name: ld-host-postgres
    restart: unless-stopped
    networks:
      - wpnet
      - traider-net
    environment:
      POSTGRES_DB: traider
      POSTGRES_USER: traider
      POSTGRES_PASSWORD: ${TRAIDER_DB_PASSWORD:-traider_password}
      POSTGRES_INITDB_ARGS: "-c listen_addresses='*'"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U traider -d traider" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: ld-host-redis
    restart: unless-stopped
    networks:
      - wpnet
      - traider-net
    command: redis-server --appendonly yes --requirepass ${TRAIDER_REDIS_PASSWORD:-redis_password} --bind 0.0.0.0
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${TRAIDER_REDIS_PASSWORD:-redis_password}", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 10

  dashboard:
    build:
      context: ../traider
      dockerfile: Dockerfile
    container_name: ld-host-dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wpnet
      - traider-net
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://traider:${TRAIDER_DB_PASSWORD:-traider_password}@postgres:5432/traider
      REDIS_URL: redis://:${TRAIDER_REDIS_PASSWORD:-redis_password}@redis:6379/0
    volumes:
      - ../traider/logs:/app/logs
      - ../traider/config.yaml:/app/config.yaml
    ports:
      - "127.0.0.1:50083:5000"
    dns:
      - 8.8.8.8
      - 8.8.4.4

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: wp-cloudflared-tunnel
    restart: unless-stopped
    depends_on:
      - ayimi
      - physicalme
      - dashboard
    networks:
      - wpnet
    command: tunnel --config /etc/cloudflared/config.yaml run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    volumes:
      - ./.cloudflared/config.yaml:/etc/cloudflared/config.yaml

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: wp-phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - wpnet
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 256M
      MEMORY_LIMIT: 512M
    ports:
      - "127.0.0.1:50090:80"

networks:
  wpnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.89.7.0/24
  traider-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.89.8.0/24

volumes:
  db_data:
  postgres_data:
  redis_data:
