name: wp

services:
  db:
    image: mariadb:11
    container_name: wp-db
    restart: unless-stopped
    networks:
      - wpnet
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ../mariadb/init:/docker-entrypoint-initdb.d

  ayimi:
    image: wordpress:latest
    container_name: wp-ayimi
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - wpnet
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${AYIMI_DB_USER}
      WORDPRESS_DB_PASSWORD: ${AYIMI_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${AYIMI_DB_NAME}
    volumes:
      - ../wordpress/ayimi:/var/www/html
    ports:
      - "127.0.0.1:50080:80"

  physicalme:
    image: wordpress:latest
    container_name: wp-physicalme
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - wpnet
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${PHYSICALME_DB_USER}
      WORDPRESS_DB_PASSWORD: ${PHYSICALME_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${PHYSICALME_DB_NAME}
    volumes:
      - ../wordpress/physicalme:/var/www/html
    ports:
      - "127.0.0.1:50081:80"

  learnarm-api:
    build:
      context: ../fastapi/learnArm
      dockerfile: ../../dockers/fastapi/learnArm/Dockerfile
    container_name: wp-learnarm-api
    restart: unless-stopped
    networks:
      - wpnet
    volumes:
      - ../fastapi/learnArm/audio_cache:/app/audio_cache
    ports:
      - "127.0.0.1:50082:8000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: wp-cloudflared-tunnel
    restart: unless-stopped
    depends_on:
      - ayimi
      - physicalme
      - learnarm-api
    networks:
      - wpnet
    env_file: .env
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: wp-phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - wpnet
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 256M
      MEMORY_LIMIT: 512M
    ports:
      - "127.0.0.1:50090:80"

networks:
  wpnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  db_data: