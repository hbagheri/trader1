name: traider

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traider-dashboard
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: 1
    volumes:
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
    ports:
      - "127.0.0.1:5001:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  default:
    driver: bridge
