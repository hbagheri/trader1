<!DOCTYPE html>
<html>
<head>
    <title>Grid Trading Bot - Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2em;
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            opacity: 0.9;
        }

        .user-info {
            color: #999;
            font-size: 14px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 8px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 8px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 5px rgba(0, 212, 255, 0.3);
        }

        button {
            grid-column: 1 / -1;
            padding: 10px 20px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        .chart-container {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .metric-card {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 6px;
            border-left: 3px solid #00d4ff;
        }

        .metric-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 18px;
            font-weight: 600;
            color: #00d4ff;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        .error {
            background: #3a1a1a;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #ff6b6b;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🤖 Grid Trading Bot Dashboard</h1>
                <p style="color: #999;">Backtest and visualize trading strategies</p>
            </div>
            <div class="header-right">
                <div class="user-info">Logged in</div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="controls">
            <div>
                <label for="exchange">Exchange</label>
                <select id="exchange">
                    <option value="binance">Binance</option>
                    <option value="toobit">Toobit</option>
                </select>
            </div>

            <div>
                <label for="symbol">Symbol</label>
                <input type="text" id="symbol" value="BTC/USDT" placeholder="e.g., BTC/USDT">
            </div>

            <div>
                <label for="strategy">Strategy</label>
                <select id="strategy">
                    <option value="SMA">SMA Crossover</option>
                    <option value="RSI">RSI</option>
                    <option value="COMBO">Combo (SMA + RSI)</option>
                    <option value="GRID">Grid Trading</option>
                </select>
            </div>

            <div>
                <label for="candles">Candles</label>
                <input type="number" id="candles" value="100" min="10" max="1000">
            </div>

            <div>
                <label for="data_source">
                    <select id="data_source">
                        <option value="mock">📊 Mock Data (Demo)</option>
                        <option value="real">🔴 Real-time Data (DB)</option>
                    </select>
                </label>
            </div>

            <button onclick="generateChart()">📈 Generate Chart</button>
            <button onclick="subscribeToLivePrice()" style="background: linear-gradient(135deg, #00ff88, #00cc66);">🔴 Subscribe to Live Prices</button>
        </div>

        <div id="priceContainer" style="display:none; padding: 15px; background: #2a2a2a; border-radius: 8px; margin-bottom: 20px; border-left: 3px solid #00ff88;">
            <strong style="color: #00ff88;">Live Price: <span id="livePrice">--</span></strong>
            <span style="margin-left: 20px; color: #999;">Last Update: <span id="lastUpdate">--</span></span>
        </div>

        <div id="errorContainer"></div>

        <div class="chart-container">
            <div id="chart" class="loading">Select parameters and click "Generate Chart"</div>
        </div>

        <div class="metrics" id="metrics"></div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        let socket = null;
        let priceUpdateInterval = null;

        // Initialize WebSocket connection
        function initSocket() {
            socket = io();

            socket.on('connect', () => {
                console.log('Connected to server');
            });

            socket.on('price_update', (data) => {
                updatePriceDisplay(data);
            });

            socket.on('subscribed', (data) => {
                console.log('Subscribed:', data);
                document.getElementById('priceContainer').style.display = 'block';
            });

            socket.on('disconnect', () => {
                console.log('Disconnected from server');
            });
        }

        function updatePriceDisplay(priceData) {
            const symbol = priceData.symbol;
            const price = priceData.price;
            const timestamp = new Date(priceData.timestamp * 1000).toLocaleTimeString();

            document.getElementById('livePrice').innerHTML = `${symbol}: $${price.toFixed(2)}`;
            document.getElementById('lastUpdate').textContent = timestamp;
        }

        async function subscribeToLivePrice() {
            if (!socket) {
                initSocket();
            }

            const exchange = document.getElementById('exchange').value;
            const symbol = document.getElementById('symbol').value;

            socket.emit('subscribe_price', {
                exchange: exchange,
                symbol: symbol
            });
        }

        async function logout() {
            try {
                const response = await fetch('/api/logout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                if (response.ok) {
                    window.location.href = '/login';
                } else {
                    alert('Logout failed');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error: ' + error.message);
            }
        }

        function generateChart() {
            const exchange = document.getElementById('exchange').value;
            const symbol = document.getElementById('symbol').value;
            const strategy = document.getElementById('strategy').value;
            const candles = parseInt(document.getElementById('candles').value);
            const dataSource = document.getElementById('data_source').value;
            const mockData = dataSource === 'mock';

            const chartDiv = document.getElementById('chart');
            const errorDiv = document.getElementById('errorContainer');
            const metricsDiv = document.getElementById('metrics');

            chartDiv.innerHTML = '<div class="loading">Generating chart...</div>';
            errorDiv.innerHTML = '';
            metricsDiv.innerHTML = '';

            fetch('/api/chart', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                credentials: 'include',
                body: JSON.stringify({
                    exchange: exchange,
                    symbol: symbol,
                    strategy: strategy,
                    num_candles: candles,
                    mock_data: mockData,
                }),
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    errorDiv.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                    chartDiv.innerHTML = '';
                } else {
                    chartDiv.innerHTML = data.chart;

                    // Display metrics
                    const metrics = data.metrics;
                    const source = data.source === 'real' ? '🔴 Real Data' : '📊 Mock Data';
                    metricsDiv.innerHTML = `
                        <div class="metric-card">
                            <div class="metric-label">Data Source</div>
                            <div class="metric-value">${source}</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">Total Profit</div>
                            <div class="metric-value">$${metrics.total_profit.toFixed(2)}</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">Total Return</div>
                            <div class="metric-value">${metrics.total_return.toFixed(2)}%</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">Win Rate</div>
                            <div class="metric-value">${(metrics.win_rate * 100).toFixed(1)}%</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">Total Trades</div>
                            <div class="metric-value">${metrics.trades}</div>
                        </div>
                    `;
                }
            })
            .catch(error => {
                errorDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
                chartDiv.innerHTML = '';
            });
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            initSocket();
            // Uncomment to auto-generate on load
            // generateChart();
        });
    </script>
</body>
</html>
